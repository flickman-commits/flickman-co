function views(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':n;}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const SYN = { ad:['ads','advertising','meta','facebook','instagram ad','campaign'],
  ads:['ad','advertising','meta','facebook','campaign'], manufacturer:['manufacturing','factory','production','manufacture'],
  manufacturing:['manufacturer','factory','production'], price:['pricing','cost','expensive','margin'],
  pricing:['price','cost','margin','perceived value'], funnel:['conversion','convert','sales funnel'],
  grow:['growth','followers','grew','audience'], post:['posting','content','consistent','consistency'],
  moq:['minimum order','units'], ship:['shipping','fulfillment'],
  email:['inbox','emails','flow'], hire:['hiring','team','delegate'],
  faire:['fair'], fair:['faire'] };
const STOP = new Set(['the','a','an','to','of','for','and','or','how','do','you','your','i','on','in','is','it','my','what','about','did','she','her']);

function expand(term){
  const t = term.toLowerCase().trim();
  const primary = t.split(/\s+/).filter(w=>w && !STOP.has(w));   // weighted high
  const syn = new Set();
  primary.forEach(w=>{ (SYN[w]||[]).forEach(s=>syn.add(s)); });
  primary.forEach(w=>syn.delete(w));
  // phrase only counts if it's genuinely multi-word & meaningful
  const phrase = (primary.length>1) ? t : null;
  return {raw:t, phrase, primary, syn:[...syn], all:[t, ...primary, ...syn].filter(Boolean)};
}
function splitSentences(text){
  const parts = text.match(/[^.!?]+[.!?]*/g) || [text];
  return parts.map(p=>p.trim()).filter(Boolean);
}
function countOcc(hay, needle){ if(!needle) return 0; let n=0,i=hay.indexOf(needle); while(i>=0){n++;i=hay.indexOf(needle,i+needle.length);} return n; }
function scoreText(sl, ex){
  let sc = 0;
  if(ex.phrase) sc += countOcc(sl, ex.phrase) * 12;
  ex.primary.forEach(t=> sc += countOcc(sl, t) * 4);
  ex.syn.forEach(t=> sc += countOcc(sl, t) * 1);
  return sc;
}
// Build a tight word-window snippet centered on the actual keyword match.
function buildSnippet(transcript, ex, pad){
  const words = transcript.split(/\s+/);
  const lw = words.map(w=>w.toLowerCase().replace(/[^a-z0-9 ]/g,''));
  const cand = [ex.phrase, ...ex.primary, ...ex.syn].filter(Boolean);
  let hit=-1, span=1;
  outer:
  for(let i=0;i<words.length;i++){
    for(const t of cand){
      if(t.indexOf(' ')>=0){ const sp=t.split(' ').length; if(lw.slice(i,i+sp).join(' ').indexOf(t)>=0){hit=i;span=sp;break outer;} }
      else if(lw[i].indexOf(t)>=0){ hit=i;span=1;break outer; }
    }
  }
  if(hit<0) return null;
  const start=Math.max(0,hit-pad), end=Math.min(words.length,hit+span+pad);
  let s = words.slice(start,end).join(' ');
  if(start>0) s='… '+s;
  if(end<words.length) s=s+' …';
  return s;
}
function fmtTime(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60), s=sec%60; return m+':'+String(s).padStart(2,'0'); }
function findTimestamp(video, ex){
  if(!video.cues || !video.cues.length) return null;
  const cand=[ex.phrase, ...ex.primary, ...ex.syn].filter(Boolean);
  for(const c of video.cues){ for(const t of cand){ if(c[1].indexOf(t)>=0) return Math.max(0, c[0]-3); } }
  return null;
}
function findAnswer(video, ex){
  const total = scoreText(video.transcript.toLowerCase(), ex);
  if(total<=0) return null;
  const short = buildSnippet(video.transcript, ex, 14);
  if(!short) return null;
  const long = buildSnippet(video.transcript, ex, 45);
  const ts = findTimestamp(video, ex);
  return {short, long, score:total, total, ts};
}
function hl(text, ex){
  let out = esc(text);
  const ts = [ex.phrase, ...ex.primary, ...ex.syn].filter(Boolean)
    .sort((a,b)=>b.length-a.length).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if(!ts.length) return out;
  const re = new RegExp('('+ts.join('|')+')','ig');
  return out.replace(re,'<mark>$1</mark>');
}

function doSearch(){
  const term = q.value.trim();
  if(!term){ app.innerHTML=''; return; }
  const ex = expand(term);
  const hits=[];
  DB.videos.forEach(v=>{ const a=findAnswer(v,ex); if(a && a.score>0) hits.push({v,a}); });
  hits.sort((x,y)=> (y.a.score-x.a.score) || (y.a.total-x.a.total) || (y.v.views-x.v.views));
  let html = `<div class="count">${hits.length} video${hits.length===1?'':'s'} where she talks about “${esc(term)}”</div>`;
  if(!hits.length){ app.innerHTML = html+'<div class="empty">Nothing yet, try a simpler word like “ads”, “price”, “manufacturer”, or “grow”.</div>'; return; }
  const top = hits.slice(0,15);
  const cards = top.map((h,i)=>`
    <div class="vresult">
      <a class="vrthumb" href="${h.v.url}" target="_blank" rel="noopener"><img src="${h.v.thumb}" loading="lazy" alt=""><span class="play">▶</span></a>
      <div class="vrmain">
        <div class="vrtitle">${esc(h.v.title)}</div>
        <div class="vrmeta">${views(h.v.views)} views${h.v.date?' · '+h.v.date:''} · mentions “${esc(term)}” ${h.a.total} time${h.a.total===1?'':'s'}</div>
        <div class="vracts">
          <a class="primary" href="${h.v.url}" target="_blank" rel="noopener">▶ Watch the video</a>
          ${h.a.ts!=null?`<span class="tstamp" title="She mentions it around here, scrub to this point">⏱ scrub to ${fmtTime(h.a.ts)}</span>`:''}
          <button onclick="toggleSaid(${i},this)">See what she said</button>
        </div>
        <div class="said" id="said${i}" style="display:none">
          <div class="passage" id="p${i}">${hl(h.a.short,ex)}</div>
          <div class="passage more" id="pm${i}">${hl(h.a.long,ex)}</div>
          ${h.a.long.length>h.a.short.length+5?`<button class="morebtn" onclick="toggleMore(${i},this)">View more context</button>`:''}
        </div>
      </div>
    </div>`).join('');
  app.innerHTML = html + `<div class="vlist">${cards}</div>`;
}
function toggleSaid(i,btn){
  const box=document.getElementById('said'+i);
  const open=box.style.display==='block';
  box.style.display=open?'none':'block';
  btn.textContent=open?'See what she said':'Hide';
  btn.classList.toggle('on',!open);
}
function toggleMore(i,btn){
  const more=document.getElementById('pm'+i), base=document.getElementById('p'+i);
  const open=more.style.display==='block';
  more.style.display=open?'none':'block'; base.style.display=open?'block':'none';
  btn.textContent=open?'View more context':'View less';
}
window.toggleSaid=toggleSaid;

function pbCard(p){
  const multi = p.master || p.type==='course';
  const isCourse = p.type==='course';
  const thumb = multi ? p.source_videos[0].thumb : p.thumb;
  const title = p.card_title || p.title;
  const desc = isCourse ? (p.blurb||p.tldr||'') : (p.tldr||'');
  const metaline = multi ? `${p.topic}${p.meta&&p.meta.read_time?' · '+p.meta.read_time:''}` : `${p.topic} · ${views(p.views)} views`;
  const badge = isCourse ? `<span class="mbadge">★ Playbook</span>`
              : p.master ? `<span class="mbadge">★ Playbook</span>` : '';
  return `<div class="pcard${multi?' master':''}" onclick="openPB('${p.id}')">
    <div class="phead"><img class="pthumb" src="${thumb}" loading="lazy" alt="">${badge}</div>
    <div class="pt">${esc(title)}</div>
    <div class="pmeta">${metaline}</div>
    <div class="pd">${esc(desc)}</div>
    <div class="pgo">Start the playbook →</div>
  </div>`;
}
function mdToHtml(md){
  const lines = md.split('\n'); let out=[], buf=[];
  const flush=()=>{ if(buf.length){out.push('<ul>'+buf.map(x=>'<li>'+inl(x)+'</li>').join('')+'</ul>');buf=[];} };
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)\*(?!\*)/g,'<em>$1</em>');
  for(let ln of lines){ const s=ln.trim();
    if(/^[-*]\s+/.test(s)){ buf.push(s.replace(/^[-*]\s+/,'')); continue; }
    flush();
    if(!s) continue;
    const m=s.match(/^(#{2,4})\s+(.*)/);
    if(m){ const lv=m[1].length; out.push(`<h${lv}>${inl(m[2])}</h${lv}>`); }
    else out.push('<p>'+inl(s)+'</p>');
  }
  flush(); return out.join('');
}
function renderLesson(md, vmap){
  const foots=[]; const order={}; let n=0,k=0; const ph={};
  const replaced = md.replace(/\{\{cite:(\d+)\}\}/g,(m,id)=>{
    if(!(id in order)){ order[id]=++n; const v=vmap[id]||{}; foots.push({num:n,title:(v.title||'Watch the video'),url:(v.url||'#')}); }
    const key='FN'+(k++); ph[key]={num:order[id], v:vmap[id]||{}};
    return ' §§'+key+'§§';
  });
  let html = mdToHtml(replaced);
  html = html.replace(/§§(FN\d+)§§/g,(m,key)=>{
    const {num,v}=ph[key];
    return `<sup class="fn"><a href="${v.url||'#'}" target="_blank" rel="noopener" title="${esc(v.title||'')}">${num}</a></sup>`;
  });
  const f = foots.length?`<div class="lfoot"><div class="lfoot-h">Go deeper</div>${foots.map(x=>`<a href="${x.url}" target="_blank" rel="noopener"><span class="fnn">${x.num}</span>${esc(x.title)}</a>`).join('')}</div>`:'';
  return html+f;
}
function openCourse(p){
  history.replaceState({},'','#pb='+p.id);
  const vmap={}; p.source_videos.forEach(v=>vmap[v.id]=v);
  const toc = p.lessons.map(l=>`<a class="tocitem" href="#les${l.n}" onclick="event.preventDefault();document.getElementById('les${l.n}').scrollIntoView({behavior:'smooth'})"><span class="tocn">${l.n}</span>${esc(l.title)}</a>`).join('');
  const lessons = p.lessons.map(l=>`
    <div class="lesson" id="les${l.n}">
      <div class="lhead"><span class="lnum">Lesson ${l.n}</span>${l.est?`<span class="lest">${esc(l.est)} read</span>`:''}</div>
      <h3>${esc(l.title)}</h3>
      <div class="lbody">${renderLesson(l.body_md, vmap)}</div>
    </div>`).join('');
  const glossary = (p.glossary&&p.glossary.length)?`
    <div class="glossary"><h3>📖 Key terms</h3>
      ${p.glossary.map(g=>`<div class="gterm"><b>${esc(g.term)}:</b> ${esc(g.def)}</div>`).join('')}
    </div>`:'';
  const aside = `
    <aside>
      <div class="aside-h">Course contents</div>
      <div class="toc">${toc}</div>
      <div class="aside-h" style="margin-top:20px">Based on ${p.source_videos.length} videos</div>
      ${p.source_videos.map(v=>`<a class="vid" href="${v.url}" target="_blank" rel="noopener"><img src="${v.thumb}" loading="lazy" alt=""><div><div class="vt">${esc(v.title)}</div><div class="vm">${views(v.views)} views</div></div></a>`).join('')}
    </aside>`;
  app.innerHTML = `
    <button class="back" onclick="setMode('playbooks')">← All playbooks</button>
    <div class="pbhead"><span class="pbkicker">★ Playbook · ${esc(p.topic)}</span>
      <h2>${esc(p.card_title||p.title)}</h2>
      <p class="pbtldr">${esc(p.outcome||p.tldr||'')}</p>
      <div class="stat-row"><div class="stat"><b>${p.lessons.length}</b>lessons</div>${p.meta&&p.meta.read_time?`<div class="stat"><b>${esc(p.meta.read_time)}</b>to read</div>`:''}<div class="stat"><b>Beginner</b>start here</div></div>
    </div>
    <div class="results"><div>${lessons}${glossary}
      <div class="closer"><p>Okay, that's the whole process start to finish. Now go make something. 🤍</p></div>
    </div>${aside}</div>`;
  window.scrollTo({top:0,behavior:'instant'});
}
function renderPlaybooks(){
  const topics=[...new Set(DB.playbooks.map(p=>p.topic))];
  const chips = `<button class="chip ${!pbFilter?'active':''}" onclick="pbFilter=null;renderPlaybooks()">All</button>`+
    topics.map(t=>`<button class="chip ${pbFilter===t?'active':''}" onclick="pbFilter='${t.replace(/'/g,"\\'")}';renderPlaybooks()">${t}</button>`).join('');
  const list = DB.playbooks.filter(p=>!pbFilter||p.topic===pbFilter);
  app.innerHTML = `<div class="pbfilters">${chips}</div><div class="grid">${list.map(pbCard).join('')}</div>`;
}
function openPB(id){
  const p = DB.playbooks.find(x=>x.id===id); if(!p) return;
  if(p.type==='course'){ openCourse(p); return; }
  history.replaceState({},'','#pb='+id);
  const stats = (p.stats&&p.stats.length)?`<div class="stat-row">${p.stats.map(s=>`<div class="stat"><b>${esc(s.big)}</b>${esc(s.label)}</div>`).join('')}</div>`:'';
  const srcMap = {};
  if(p.master) p.source_videos.forEach(v=>srcMap[v.id]=v);
  const steps = p.steps.map((s,i)=>{
    const sv = p.master && s.source ? srcMap[s.source] : null;
    const srclink = sv?`<a class="stepsrc" href="${sv.url}" target="_blank" rel="noopener" data-id="${sv.id}">▶ Source: ${esc(sv.title)}</a>`:'';
    return `<div class="step"><div class="step-head"><div class="num">${i+1}</div><h3>${esc(s.title)}</h3></div>
      <ul>${s.points.map(pt=>`<li>${esc(pt)}</li>`).join('')}</ul>
      ${s.quote?`<div class="quote">“${esc(s.quote)}”<span>${esc(s.quote_label||'In her words')}</span></div>`:''}
      ${srclink}
    </div>`;
  }).join('');
  const bonus = p.bonus?`<div class="tip"><h3>⭐ ${esc(p.bonus.title)}</h3><ul>${p.bonus.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:'';

  if(p.master){
    const aside = p.source_videos.map(v=>`
      <a class="vid" href="${v.url}" target="_blank" rel="noopener" data-id="${v.id}">
        <img src="${v.thumb}" loading="lazy" alt="">
        <div><div class="vt">${esc(v.title)}</div><div class="vm">${views(v.views)} views${v.date?' · '+v.date:''}</div></div>
      </a>`).join('');
    app.innerHTML = `
      <button class="back" onclick="setMode('playbooks')">← All playbooks</button>
      <div class="pbhead"><span class="pbkicker">★ Master playbook · ${esc(p.topic)}</span>
        <h2>${esc(p.title)}</h2><p class="pbtldr">${esc(p.tldr||'')}</p>${stats}</div>
      <div class="results"><div>
        ${p.intro?`<div class="pintro">${esc(p.intro)}</div>`:''}
        ${steps}${bonus}
        <div class="closer"><p>${esc(p.closer||'')}</p></div>
      </div>
      <aside><div class="aside-h">Source videos (${p.source_videos.length})</div>${aside}</aside>
      </div>`;
    app.querySelectorAll('.stepsrc').forEach(el=>{
      el.addEventListener('mouseenter',()=>{const c=app.querySelector(`aside .vid[data-id="${el.dataset.id}"]`); if(c){c.classList.add('hot');c.scrollIntoView({block:'nearest'});}});
      el.addEventListener('mouseleave',()=>{const c=app.querySelector(`aside .vid[data-id="${el.dataset.id}"]`); if(c)c.classList.remove('hot');});
    });
    window.scrollTo({top:0,behavior:'instant'});
    return;
  }

  app.innerHTML = `<div class="pbview">
    <button class="back" onclick="setMode('playbooks')">← All playbooks</button>
    <div class="pbhead"><span class="pbkicker">${esc(p.topic)}</span>
      <h2>${esc(p.title)}</h2><p class="pbtldr">${esc(p.tldr||'')}</p>${stats}</div>
    <div class="metacard"><img src="${p.thumb}" alt="">
      <div><div class="mt">The original video</div><div class="mm">@nat.lucyy · ${views(p.views)} views${p.duration?' · '+p.duration:''}</div></div>
      <a href="${p.url}" target="_blank" rel="noopener">▶ Watch</a></div>
    ${p.intro?`<div class="pintro">${esc(p.intro)}</div>`:''}
    ${steps}${bonus}
    <div class="closer"><p>${esc(p.closer||'')}</p>
      <a class="watch" href="${p.url}" target="_blank" rel="noopener">▶ Watch the full video</a></div>
  </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function setMode(m){
  mode=m;
  document.getElementById('tab-search').classList.toggle('active',m==='search');
  document.getElementById('tab-pb').classList.toggle('active',m!=='search');
  searchwrap.style.display = m==='search'?'block':'none';
  if(m==='search'){ history.replaceState({},'',location.pathname); doSearch(); }
  else { renderPlaybooks(); }
}
q.addEventListener('input', doSearch);

// initial route
(function(){
  const h=decodeURIComponent(location.hash.replace('#',''));
  if(h.startsWith('pb=')){ setMode('playbooks'); openPB(h.slice(3)); }
  else setMode('playbooks');
})();
window.openPB=openPB; window.setMode=setMode; window.doSearch=doSearch; window.renderPlaybooks=renderPlaybooks; window.toggleMore=toggleMore;
</script>
