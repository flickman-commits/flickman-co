<!DOCTYPE html>
<html lang="en"><head>

<title>The @nat.lucyy Vault</title>
<style>
:root{
 --pink-1:#fdeef1; --pink-2:#fbe3ea; --pink-soft:#f8d9e3; --pink-line:#f2cdd9;
 --ink:#231b1e; --ink-soft:#544a4f; --muted:#9a8b91;
 --accent:#d4607f; --accent-ink:#b14a67;
 --card:#fff; --line:#f0e3e8; --chip:#fbeef2; --btn:#1f181b;
 --radius:18px; --shadow:0 8px 30px rgba(150,70,100,.08);
}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;color:var(--ink);background:var(--pink-1);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
 line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit}
.nav{display:flex;align-items:center;justify-content:space-between;max-width:1180px;margin:0 auto;padding:20px 28px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;letter-spacing:-.02em;cursor:pointer}
.brand .mark{width:25px;height:25px;border-radius:8px;background:var(--btn);display:grid;place-items:center;color:#fff;font-size:13px}
.navbtn{background:var(--btn);color:#fff;border:none;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;cursor:pointer}
.hero{background:linear-gradient(180deg,var(--pink-2),var(--pink-1) 70%);padding:46px 28px 30px}
.hero-in{max-width:1180px;margin:0 auto;text-align:center}
.eyebrow{display:inline-block;background:#fff;border:1px solid var(--pink-line);color:var(--accent-ink);
 font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;border-radius:999px}
.avatarlink{display:inline-block;margin:22px auto 16px;line-height:0;transition:transform .15s}
.avatarlink:hover{transform:scale(1.04)}
.avatar{width:98px;height:98px;border-radius:50%;object-fit:cover;display:block;
 border:3px solid #fff;box-shadow:0 6px 18px rgba(150,70,100,.18)}
.tstamp{display:inline-flex;align-items:center;font-size:12.5px;font-weight:600;color:var(--accent-ink);background:var(--chip);border:1px solid var(--pink-line);border-radius:10px;padding:9px 13px}
h1.title{font-size:clamp(38px,6vw,62px);line-height:1.08;letter-spacing:-.03em;font-weight:800;margin:18px auto 12px;max-width:18ch;text-wrap:balance}
.hero p.sub{font-size:17px;line-height:1.55;color:var(--ink-soft);max-width:52ch;margin:0 auto 24px;text-wrap:balance}
.tabs{display:inline-flex;background:#fff;border:1px solid var(--pink-line);border-radius:999px;padding:5px;gap:4px;box-shadow:var(--shadow)}
.tab{border:none;background:transparent;color:var(--ink-soft);font-size:15px;font-weight:600;
 padding:11px 22px;border-radius:999px;cursor:pointer;transition:.15s}
.tab.active{background:var(--btn);color:#fff}
.searchwrap{max-width:600px;margin:22px auto 0}
.sbox{position:relative}
#q{width:100%;padding:16px 20px 16px 50px;font-size:16.5px;border:1.5px solid var(--pink-line);
 border-radius:14px;background:#fff;outline:none;box-shadow:var(--shadow);color:var(--ink)}
#q:focus{border-color:var(--accent)}
.sbox .ic{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--muted);pointer-events:none}
.hint{margin-top:11px;color:var(--muted);font-size:13.5px}
.hint b{color:var(--accent-ink);cursor:pointer;font-weight:600}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px 90px}
.count{color:var(--muted);font-size:14px;margin:24px 4px 8px}
.empty{text-align:center;color:var(--muted);padding:54px 0}
/* search results: two col */
.results{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:32px;align-items:start;margin-top:10px}
.ans{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow)}
.ans .qmark{color:var(--accent);font-size:30px;line-height:0;font-weight:800;font-family:Georgia,serif}
.ans .passage{font-size:17px;color:#372d31;margin:6px 0 14px}
.ans .passage.more{display:none}
.ans .src{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:12px}
.ans .src .st{font-size:13px;color:var(--muted)}
.ans .src .st b{color:var(--ink);font-weight:600}
.ans .acts{margin-left:auto;display:flex;gap:8px}
.ans .acts button,.ans .acts a{font-size:12.5px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink-soft)}
.ans .acts a.primary{background:var(--btn);color:#fff;border-color:var(--btn)}
mark{background:#ffe1ec;padding:0 2px;border-radius:3px;font-weight:600}
/* video-finder results */
.vlist{max-width:720px;margin:6px auto 0}
.vresult{display:flex;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.vrthumb{position:relative;flex:none;width:74px;height:98px;border-radius:11px;overflow:hidden;background:var(--pink-soft)}
.vrthumb img{width:100%;height:100%;object-fit:cover;display:block}
.vrthumb .play{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:20px;background:rgba(40,20,30,.18);opacity:0;transition:.15s}
.vrthumb:hover .play{opacity:1}
.vrmain{flex:1;min-width:0}
.vrtitle{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.vrmeta{font-size:12.5px;color:var(--muted);margin:5px 0 12px}
.vracts{display:flex;gap:8px;flex-wrap:wrap}
.vracts a,.vracts button{font-size:13px;font-weight:600;border-radius:10px;padding:9px 15px;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink-soft)}
.vracts a.primary{background:var(--btn);color:#fff;border-color:var(--btn)}
.vracts button.on{background:var(--chip);color:var(--accent-ink);border-color:var(--pink-line)}
.said{margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
.said .passage{font-size:15px;color:#4a4046;font-style:italic;margin:0}
.said .passage.more{display:none}
.morebtn{margin-top:10px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--accent-ink);border-radius:9px;padding:7px 12px;cursor:pointer}
@media(max-width:560px){.vrthumb{width:60px;height:80px}}
aside{position:sticky;top:16px}
.aside-h{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 4px 12px}
.vid{display:flex;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px;margin-bottom:9px;text-decoration:none;transition:.14s}
.vid:hover{border-color:var(--accent);transform:translateX(-2px)}
.vid img{width:50px;height:66px;border-radius:9px;object-fit:cover;flex:none;background:var(--pink-soft)}
.vid .vt{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.vid .vm{font-size:11.5px;color:var(--muted);margin-top:3px}
/* playbooks grid */
.pbfilters{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 4px}
.chip{border:1px solid var(--line);background:#fff;color:var(--muted);padding:7px 14px;border-radius:999px;font-size:13px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--accent)} .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px;margin-top:16px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;box-shadow:var(--shadow);display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 14px 36px rgba(150,70,100,.13)}
.pcard .phead{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.pthumb{width:46px;height:46px;border-radius:11px;object-fit:cover;flex:none;background:var(--pink-soft)}
.pcard .pt{font-size:20px;font-weight:700;line-height:1.25;letter-spacing:-.015em;margin:0 0 7px;color:var(--ink)}
.pcard .pmeta{font-size:12.5px;color:var(--muted);font-weight:500;margin:0 0 13px}
.pcard .pd{font-size:15.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 18px;flex:1}
.pcard .pgo{margin-top:auto;padding-top:15px;border-top:1px solid var(--line);color:var(--accent-ink);font-weight:600;font-size:14px}
.pcard.master{border-color:var(--line);background:#fff}
.mbadge{display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:7px}
.stepsrc{display:inline-block;margin-top:13px;font-size:12.5px;font-weight:600;color:var(--accent-ink);text-decoration:none;background:var(--chip);border:1px solid var(--pink-line);padding:6px 11px;border-radius:9px}
.stepsrc:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.vid.hot{border-color:var(--accent);box-shadow:0 0 0 3px var(--pink-soft)}
.mbadge.course{background:var(--btn)}
/* course view */
.toc{display:flex;flex-direction:column;gap:2px;margin-bottom:6px}
.tocitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;font-size:13.5px;color:var(--ink-soft);text-decoration:none;font-weight:500}
.tocitem:hover{background:var(--chip);color:var(--accent-ink)}
.tocn{flex:none;width:21px;height:21px;border-radius:6px;background:var(--chip);color:var(--accent-ink);font-size:12px;font-weight:700;display:grid;place-items:center}
.lesson{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px 26px;margin:13px 0;box-shadow:var(--shadow);scroll-margin-top:16px}
.lhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.lnum{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-ink);background:var(--chip);padding:4px 10px;border-radius:999px}
.lest{font-size:11.5px;color:var(--muted)}
.lesson h3{font-size:21px;letter-spacing:-.01em;margin:4px 0 8px}
.lbody p{font-size:16px;color:#3f353a;margin:0 0 12px}
.lbody h3,.lbody h4{font-size:16px;margin:16px 0 6px;color:var(--accent-ink)}
.lbody ul{margin:8px 0 12px;padding-left:20px}
.lbody li{font-size:15.5px;color:#3f353a;margin:6px 0}
.lbody strong{color:var(--ink)}
.glossary{background:linear-gradient(180deg,#fff,#fff7fa);border:1px dashed var(--pink-line);border-radius:18px;padding:22px 26px;margin:16px 0}
.glossary h3{margin:0 0 12px;font-size:18px}
.gterm{font-size:14.5px;color:#3f353a;margin:8px 0;line-height:1.5}
.gterm b{color:var(--accent-ink)}
.fn{line-height:0}
.fn a{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--chip);border-radius:4px;padding:0 4px;text-decoration:none;margin-left:1px}
.fn a:hover{background:var(--accent);color:#fff}
.lfoot{margin-top:16px;padding-top:13px;border-top:1px solid var(--line)}
.lfoot-h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
.lfoot a{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft);text-decoration:none;padding:5px 0;font-weight:500}
.lfoot a:hover{color:var(--accent-ink)}
.fnn{flex:none;width:18px;height:18px;border-radius:5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}
/* playbook reading view */
.back{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);color:var(--ink-soft);
 padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;margin:24px 0 6px}
.pbview{max-width:760px;margin:0 auto}
.pbhead{text-align:center;padding:6px 0 4px}
.pbkicker{display:inline-block;background:var(--chip);color:var(--accent-ink);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px}
.pbview h2{font-size:clamp(26px,4vw,38px);letter-spacing:-.025em;line-height:1.08;font-weight:800;margin:14px auto 10px;max-width:18ch}
.pbtldr{font-size:17px;color:var(--ink-soft);max-width:50ch;margin:0 auto 16px}
.stat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 15px;font-size:12.5px;color:var(--ink-soft)}
.stat b{color:var(--accent-ink);font-size:15px;display:block}
.metacard{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow);margin:8px 0}
.metacard img{width:58px;height:76px;border-radius:10px;object-fit:cover;flex:none;background:var(--pink-soft)}
.metacard .mt{font-weight:700;font-size:14px} .metacard .mm{color:var(--muted);font-size:12px;margin-top:2px}
.metacard a{margin-left:auto;flex:none;background:var(--btn);color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:10px 15px;border-radius:10px}
.pintro{background:var(--chip);border:1px solid var(--pink-line);border-radius:16px;padding:16px 18px;font-size:15.5px;color:#46393e;margin:8px 0}
.step{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin:13px 0;box-shadow:var(--shadow)}
.step-head{display:flex;align-items:flex-start;gap:13px}
.num{flex:none;width:32px;height:32px;border-radius:10px;background:var(--accent);color:#fff;font-weight:800;font-size:15px;display:grid;place-items:center}
.step h3{font-size:19px;letter-spacing:-.01em;margin:3px 0 0}
.step ul{margin:13px 0 0;padding-left:20px}
.step li{margin:7px 0;font-size:15.5px;color:#3f353a}
.quote{margin:14px 0 0;border-left:3px solid var(--accent);background:var(--pink-1);border-radius:0 10px 10px 0;padding:11px 15px;font-size:14.5px;font-style:italic;color:#5a4a50}
.quote span{display:block;font-style:normal;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.tip{background:linear-gradient(180deg,#fff,#fff7fa);border:1px dashed var(--pink-line);border-radius:18px;padding:20px 22px;margin:13px 0}
.tip h3{margin:0 0 8px;font-size:17px} .tip li{font-size:15px;color:#3f353a;margin:6px 0}
.closer{text-align:center;margin-top:30px;padding:28px 24px;background:var(--btn);color:#fff;border-radius:22px}
.closer p{font-size:18px;line-height:1.45;margin:0 auto 16px;max-width:42ch}
.closer .watch{display:inline-block;background:#fff;color:var(--btn);text-decoration:none;font-weight:700;font-size:15px;padding:12px 24px;border-radius:12px}
footer{max-width:1180px;margin:0 auto;padding:30px 28px 50px;color:var(--muted);font-size:12.5px;text-align:center}
@media(max-width:880px){.results{grid-template-columns:1fr}aside{position:static}}
@media(max-width:600px){
 .hero{padding:26px 18px 22px}
 .hero p.sub{font-size:15.5px;margin-bottom:20px}
 h1.title{font-size:clamp(30px,8.6vw,40px);line-height:1.1;margin:14px auto 10px}
 .avatar{width:85px;height:85px}
 .searchwrap{margin-top:18px}
 #q{font-size:16px;padding:15px 18px 15px 46px}
 .sbox .ic{left:16px;width:18px;height:18px}
 .hint{font-size:12.5px}
 .wrap{padding:0 16px 72px}
 .tabs{width:100%;max-width:340px}
 .tab{flex:1;padding:12px 10px;font-size:14px;text-align:center}
 .grid{grid-template-columns:1fr;gap:14px}
 .pcard{padding:18px}
 .pbfilters{gap:7px;margin:20px 0 2px}
 .chip{font-size:12.5px;padding:8px 13px}
 .count{font-size:13px}
 /* search result cards */
 .vlist{margin-top:4px}
 .vresult{padding:12px;gap:12px;border-radius:14px}
 .vrthumb{width:62px;height:82px}
 .vrtitle{font-size:15.5px}
 .vrmeta{font-size:12px;margin:4px 0 10px}
 .vracts{gap:6px}
 .vracts a,.vracts button,.tstamp{font-size:12px;padding:9px 12px;flex:1 0 auto;text-align:center;justify-content:center}
 .said .passage{font-size:14px}
 /* playbook + course reading views */
 .back{margin:18px 0 4px}
 .pbview h2,.pbhead h2{font-size:27px}
 .pbtldr{font-size:15.5px}
 .pbview{max-width:none}
 .step,.lesson,.glossary,.tip{padding:18px 18px;border-radius:16px}
 .lesson h3,.step h3{font-size:18px}
 .lbody p,.step li{font-size:15px}
 .metacard{padding:11px}
 .stat{padding:8px 12px;font-size:12px}
 .closer{padding:22px 18px}
 .closer p{font-size:16px}
 footer{padding:24px 18px 40px}
}
</style></head>

e and why it's, like, helpful for them. The other thing she said that was really interesting, as far as pricing goes, she was like, you need to price your product high. I was like, I'm nervous. I don't want to price too high. I want to, like, price a little bit lower. She's like, huge mistake. You as a small business owner, will never be able to compete with a target and Amazon or any of the likes. So why are you Trying to play that game realistically, your only market is a higher end market. And also there's a psychology of perceived value. If you price something higher and your packaging is amazing and the story is amazing and the it actually is high quality in the materials are high quality and you have the margin to be able to invest into a really good product. Then when someone purchases that, they are going to appreciate it so much more, wear it so much more, tell the people they love about it because it's an incredible product. And the perceived value that it's higher then like a thirty dollar T-shirt that they wear a couple times and then ends up in a donation pile. So that was a really big thing about pricing. Another big thing she said besides like telling the story is packaging is so important. I'm making my hang tags and labels right now. And she was like. I was like, you know, it's kind of expensive, like it's my first run, maybe I should just do something very simple. And she's like, no, everything matters. Your hang tags are your brand, that is your business card, it is your product. The same quality and care that you put into making the dress, in my case, the nightgown or whatever your product is should also go into the hang tag and the label. Add in the extra embellishments. Really just it shows when you're consistent through everything. From The website, the branding, the packaging. If you say you're recycled, 100% recycled materials are 100% organic. Your packaging should also be in line with that story. Otherwise it breaks trust and it creates inconsistencies. As far as, like, the majors, I was like, how do I get into a Nordstrom or revolve? Like, do I cold pitch people? And she's like, to be honest, think about that two to three years in. Unless revolve comes knocking at your door, do not worry about that. Because to play that game, you need to have your manufacturing and your distribution and just like how you produce these garments so dialed you cannot make any mistakes. And you basically need to be like so ready cause you have one opportunity. And then if you mess up, like, you're kicked to the curb, you're out and you're not getting back in. So she's like, don't worry about that until you're like two to three years in. And more than just like, building a big brand, that's more about like, having your operations and logistics styled. I feel like she said one more thing that's really good. Hold on, give me a second. Oh. As far as how to get in with the actual boutiques, she was like, the first thing you should be doing is cold Dming or just sliding into the DMs of all these different brands or emailing them, calling them whatever, and then giving them a small amount of inventory. Or even just being like, here, I'm gifting this to you. Write a little thank you card. Like, really make the packaging amazing and tell them the story. Like, write out the story, cause they're selling off of a story and basically say, I'm giving this to you for consignment. If you love it, you can buy more. But she also said, back in the day, the way to get in with these brands is going to a trade show in Vegas or LA or New York. And those trade shows are like $5,000 a booth, and you have to pay for, like, the travel, and you have, like, one shot, and it's just crazy, and it's very expensive. And she was like, realistically, it's not effective for a small business owner or for you. Now, there's this brand called FAIR, which is like an online kind of wholesale marketplace. She. She's gonna get me in on FAIR through, like, a vendor referral link because she's already in on it. But she's like, you definitely need to get on FAIR. That just fixes everything. You don't need to pay for anything up front. It's like, immediate turnaround time. I can just replenish. Cause she also, if you're doing the trade show route, you buy like, three to nine months in advance, versus with FAIR, like, you buy one to two weeks in advance. So overall amazing. Like, I Learned so much. I'm so grateful. You need to just have conversations with People. And, like, honestly, people are so amazing when they're just down to, like, give you all this information and life experience. I just feel really, really fired up and really grateful. And now I'm gonna, like, go create my hang tags and labels and make them really nice. Oh, I'm so excited. Okay, good luck.", "cues": [[0.1, "if you're starting a brand or you want to start a brand,"], [2.9, "you need to listen to this."], [4.2, "i just got back from talking with a boutique brand owner."], [8.4, "so she owns her own boutique store."], [10.4, "and i was like, how do brands get into boutiques?"], [12.5, "i want to start doing wholesale."], [14.4, "how do i get into the majors like nordstroms and revolve?"], [17.1, "like, how does that whole process work?"], [18.7, "and she told me, like,"], [20.0, "i literally have, like,"], [21.2, "four pages worth of stuff."], [23.1, "she gave me the best insight ever."], [26.3, "the first thing she said,"], [27.9, "and the most important thing is having a story."], [31.2, "she wants a maker story. so it's woman owned,"], [35.4, "it's made in la. there's like,"], [37.6, "some sort. it's your grandmother's for my situation."], [40.6, "your grandmother sleepwear."], [42.1, "like, it needs a story."], [44.1, "and i actually saw her do it."], [46.4, "all the customers that kept walking in,"], [48.5, "she sold every product by telling the most, like,"], [51.5, "incredible story of why this product came into existence and why it's,"], [55.7, "lik us on? As a business owner, you can focus on. You have to focus on so many things, it becomes very difficult to kinda know what should I be spending my days doing. And so this is my. It's pretty foolproof for me. Like, this is the formula that I've been using. It works incredibly well for me. I wanna share it in case it could be helpful for you. But the two biggest themes on all of this, before I get into it, is focus on the highest leverage task and be brutally honest with yourself. It only works if you do those two things. Let's double click on the focus on the high leverage task for a second. There is a video I recommend you watching. It's on YouTube. I think it's called the one thing or something like that. It's a girl who, um, is doing, like, a book review, and she, like, gives a synopsis of the book. I watched it last year and it shaped my entire year. And it really worked. The whole idea is like, there is usually one thing that if you did that one thing, it would have An outsized impact on everything else. If you kinda cut all the other stuff and just focus on the one thing, you would have so much more momentum and things would just be flowing. So last year, for example, highest leverage task that I could be doing, the one thing was posting on TikTok every single day. So you gotta figure out what your highest leverage tasks are and be brutally honest on, like, what's actually moving the needle, and then just focus on those. Okay, so how does that, like, abstract concept translate on the daily? I like to plan my whole week out on Sunday, and then come Monday, I kinda hit the ground running. I already have a roadmap, so there's, like, no wasted time. So on Sundays, I reflect and journal on what worked and what didn't work from the week before, and I map out my top three priorities. I don't do ten. I don't do one because I can never really do one. But I do top three priorities of the week. So, for example, one of my priorities for this week is to find a space to be able to host an event for all the New York girlies in my community to meet up. Then you're gonna go into your calendar and block off time during the week, basically creating a skeleton of what your week should look like. So if your goal is to grow on TikTok, what tasks do you need? To be doing. To be growing on TikTok. Well, I gotta be posting every single day. So you block off time on your calendar everyday to be posting. If I wanna find a place to host the event in New York City. Okay, so I need to respond to these emails with my hot leads, and I need to reach out to these other places that I haven't heard from, that heard back from. I need to do a research session and find other spots. So all of that gets scheduled into the calendar. And because of this, before the week has even started, I already have a skeleton of my week. I really like to treat my calendar like a to do list. By doing this, my to do list never gets too long. And everything on my to do list gets done because it's literally scheduled into a slot. And then anything that doesn't get done on that day before I go to bed, I move it over and I slot it on the next day. The other really big thing that I do that makes a really big difference is I kind of look at my work through the quadrants. Have you guys heard of these quadrants? It's like urgent, important, not urgent, not important, something like that. I really only touch urgent and important tasks. Anything that's not important, I don't really touch. So an example of this, although it is a time sensitive urgent task to Be posting on our brand's Instagram. Me posting it is not important. Me even planning it is probably not my highest leverage task. And so we've delegated to Kayla, who does our social media. Now, something that's not urgent and not important and not high leverage at all is posting on our Instagram Stories on Lucine. This gets like 50 views. Unless for 24 hours, that is not a high leverage good use of Kayla's time, or my time for t gal, China and Turkey. I'm manufacturing in LA to start with. The reason being is because, like I said, this isn't a completely new industry to me. So I'm almost taking it as like, an opportunity to learn. I'm treating. Treating it as like my university, so to speak. So I'm going into the factory floor, I'm understanding how things work, I'm being able to talk to someone in person, feel the products in person, and just really understand how this whole manufacturing clothing industry process works, which has been extremely informative. The problems with LA, the main one besides it Being very expensive for obvious reasons. Because the labor is so expensive here, because the cost of living is expensive. The other issue is LA is not vertically integrated. So that means that one person is doing your fabric in this mill, another manufacturer is cutting it, another manufacturer is dying it, another one is sewing it. A person, a third party person is sending you the trims and the straps. So it's all fragmented, and everybody obviously gets their cut in that, so the price goes up. Also, because it's so fragmented, you also get your labels and your hang tags from someone else, your packaging from somewhere else. Everything is fragmented, and because of that, it's less efficient. But also it's much more expensive. And from a supply chain perspective, if you run out of product with one, like, the whole thing gets messed up. I think if you're just starting out, it's an incredible way to learn. But scalability, probably not the move. And I think it's important to know that, like, it's okay for things to be a stepping stone. For me, it is a stepping stone, and that's all right. That's everything. LA Portugal is really wonderful as well. He had great things to say. Um, but he said Turkey and China are the best in the game. Specifically, China is the best, hands down. They have the best technology. They are a manufacturing country. Their entire industry is built off of that, and they Invest all their money as a country right back into it. And so even though China has like a bad rap, because the fast fashion and stuff, truly, like, they are the best in the game when it comes to manufacturing and technology and just like, work ethic and the desire to like, get it going. This is all what he said. Again, I have very little experience, but I mean, with what I've been hearing and researching, this all kind of checks out as well. Okay, let's talk about MLQs. So I ordered 300 pieces for my first run because that was the MOQ of my manufacturer. That's like medium to standard. Um, it's. It's not a small MOQ. What Alex was saying with his seven figure brand, he still does runs for 50 pieces, which is, it's just like, really great to hear that massive brands can do small runs to, like, test product and see if things work. He also does runs for like 2,000 units cause he's at that level. But like, for someone like me, if I were to do it again, and if I wasn't manufacturing in LA and had the option, I would love for my like, next runs to be 50 to 100, max like 200. Just so you can test out what works and what doesn't work. And then as far as quality goes, that's something I've been thinking a lot about. Consistent quality. And again, he really recommended China, Turkey, LA, unfortunately, they just don't have, like this, the infrastructure to be able to offer that. But I'm still learning a lot, so please take all this with a grain of salt, and I hope it's helpful. Okay. Bye.", "cues": [[0.0, "if you have a brand or you want to start a brand,"], [2.7, "you need to listen to this."], [3.9, "i just got back from talking with the most incredible person."], [8.1, "he has seven years of experience in the manufacturing space."], [11.8, "he's built a brand up to seven figures."], [13.7, "alex, hi."], [14.6, "if you're watching this, you're amazing."], [16.7, "he was incredibly knowledgeable"], [18.3, "and gave me so much information about where to find manufacturers o on, like, Alibaba and try to source things that way, but it freaked me out. I was like, oh, this seems just so unbelievably sketchy and seems like there's gonna be a lot of trial and error, which is obviously very expensive. So I cut all of that. I am lucky enough to be in LA right now, so I focused on in person relationships, and I've narrowed my scope just to LA. And I don't want to deal with the tariffs. And two, I don't fully understand the vocabulary, how it all works. I want to, like, be able to see it in person and, like, just, like, understand it a little bit more. That's number one. Number two is there are Different people that you go to. You don't just go to a manufacturer and they do it all. You can go to an agent, and they have agents that are kind of like the broker in between who connect you to all the pieces. But really, there's, like, a lot of different players in the game. It's very fragmented. So I'm acting as my own agent because an agent can be a little expensive. Plus, I kind of want to learn. There's a fabric mill that you talk to. These are the people who actually make. They weave or they knit the fabric. Then there's a wholesaler who you buy all the components from. So that's, like, buttons, zippers. I have, like, adjustable straps. I have little bows on my pajamas, lace trim. Those are all the components that you buy from a wholesaler. Again, the agent can source all of this. But I'm doing. I'm being my own agent. So now you got all the ingredients, you have the fabric, you have the components, and you're gonna take all that and hand it off to your manufacturer, who's gonna cut it and sew it. But they don't know how to do that, so you need to give them a couple things. One is a tech pack, which is basically, like, your recipe. And to get a tech pack, either A, you need to figure out how to do it yourself, or B, what I'm doing is hiring a freelancer. Tell them what you want. They sketch out your piece. They add in all the measurements. Like, the waist needs to be 25 inches, and the bus needs to be this, and it needs to be this long. And then there's something called grading that changes the measurements based off of the size. So, like, an extra small, small, medium, large. That's grading. It's, like, gradually going up. There's also a build material. So, again, like, all of the different ingredients in this recipe. So then you hand over your ingredients and the recipe card, aka the tech pack, to your manufacturers. They're gonna take that and make a pattern. So this is just like, here. I'll put an image right here. They're gonna put that on the fabric, they're gonna cut the material, and then they're gonna sew it. And then they're gonna give you a sample or a prototype. And ideally, at this phase, you've given them a reference sample, so something very similar to what you want your piece to look like. So once you get your sample, then you can go into production. Okay, so now let's talk about timelines. So for me, my fabric, just to create it, is going to take five weeks. Then for the manufacturer side, I don't know exactly how long that's going to take, but I'm also estimating five to six weeks. So that whole process just to produce the garment is about two months. So keep that in mind. And that's like, once you've already found the people that you're gonna work with. Again, it's been 60 days for me, and I've been looking for the people that I wanna build a relationship with. The other thing is, once you find the person, one, they may be really slow to respond. That's what I'm noticing. And two, they might not be good. So I've had people ghost me, I've had. I've gone in for tours and then I just don't get follow up with pricing. I think one part of this is, is like finding the right manufacturers to be able to bring your vision to life. And honestly, that's where agents come in and they can make the process a lot smoother. As far as pricing goes, I'm still figuring it out, but that adds up quickly as well. I think there are a lot of ways where you can reduce the pricing by doing things yourself or just kind of like working the system a little bit. I have a lot of tips on that. Okay, that's like pretty much all I've gotten so far. I'll let you know. Feel free to ask questions and I might be able to answer them, but I'll keep you posted on how it's going. I'm making an organic sleepwear brand. Hope that's helpful. Let me know if you have any questions. Bye.", "cues": [[0.5, "for anyone who's looking to make their own fashion brand,"], [3.1, "here's my little ted talk for you."], [5.3, "i'm 60 days into it, so i'm not a genius."], [9.5, "here's everything i've learned from how much it costs,"], [12.4, "how long it takes, where to go,"], [14.8, "should i do it overseas, should i do it here?"], [16.9, "how do the tariffs impact everything?"], [18.6, "this is literally everything that i've learned from my brain to yours."], [22.2, "i hope it's helpful. so"], [23.6, "first thing you gotta understand is"], [26.2, "the fashion industry is very outdated."], [28.9, "there are a lot of these manufacturers are not on their own websites,"], [31.7, "they don't have a ceo, they're very hard to find."], [34.5, "and so it's very much like who,"], [36.5, "you know, kind of an industry."], [38.1, "you can go on, like,"], [39.1, "alibaba and try to source things that way,"], [41.8, "but it freaked me out. i was like, oh,"], [45.3, "this seems just so unbelievably sketchy"], [48.0, "and seems like there's gonna be a lot of trial and error,"], [50.7, "which is obviously very expensive."], [52.7, "so i cut all of that. i am lucky enough to be in la right now,"], [56.8, "so i focused on in person relationships,"], [59.4, "and i've narrowed my scope just to la."], [62.4, "and i don't want to deal with the tariffs."], [64.0, "and two, i don't fully understand the vocabulary,"], [67.7, "how it all works. i want to, like,"], [69.1, "be able to see it in person and, like,"], [71.3, "just, li ": "/content/assets/thumbs/7551283785891908877.jpg", "transcript": "I just hit 25 k on TikTok. Woohoo! And I get a lot of questions from my friends about, like, how to post consistently on TikTok and, like, how I got here. And I want to make a little video on it with my. The tips that have helped me the most, because six months ago, if you scroll back on my page, my content was not consistent. I was not at the same following, and I just, like, was not where I am now. There are three main things that I did that have had the biggest impact. So here they are. First off, I joined an accountability group back in April, I decided I was gonna be a content creator. The reason I wanted to do this is not to be, like, an influencer content creator in that way. It's more that I realized that distribution is the most important thing. So once I made that decision, I was like, okay, let's take this bitch seriously. So I joined an accountability group. I would say that the accountability group wasn't, like, profound and that it gave me a bunch of, like, tips and tricks. It was more just, like, creating the mental space. So every week we'd hop on a call. You have to, like, show up and say you either posted or you didn't. And for me, it was more awkward and cringe to be out of integrity in front of my peers in that group than It was to actually post online. And so that kind of like balanced out the scale a little bit more and help me get into the swing of posting. Another thing that that did is like, it helped me think through the frame of if I was a content creator with 2 million followers, what are the things that I would be doing? I would be posting every day, most definitely. I would not be skipping weeks or days or whatever. Like it just be part of my routine. And so I kind of started to adopt the characteristics of someone who has 2 million followers. Even if my content wasn't good, at least my habits were solid. And of course, we know practice makes perfect. You put in the reps, you're gonna get there. Okay. So that was the accountability group. It created a lot of space, it created some structure. The second big thing I did was create a challenge. I made a 30 day challenge. If you know me, I love a 30 day challenge. We need a little sprint to get some momentum and gamify the whole thing. This made a really big difference for me. Change the goal from like views or followers or metrics that were a little bit harder to attain to things that were very. That were 100% in my control. The goal is post every single day. It could be shit, it doesn't matter what it is as long as you get it. Up there, that is the most important thing. And then, of course, like, once I started to get into the habit of posting once a day, I was like, well, I might as well make my content good, you know? And another thing that that gave me is it started to help me get comfortable speaking to the camera. I would say I'm still not 100% comfortable speaking to the camera, but, like, jeez, I just talked for three minutes straight. Whereas before, I would always pick up the phone, record it, like, half a sentence, and then, like, think about what I was gonna say, and then record the next half of the sentence and think about it, and spend hours editing. Now I'm like, I talk to the camera, we get it done efficiently. Another really big thing people tell me is like, oh, I'm so busy with work, like, I don't have time. Or, like, I'm too busy running my company, I don't have time. I agree. Like, if I was doing it the way that I was doing it, I would not have time. But if I. I've spent four minutes on this video, I'll probably spend a total of, like, 15 minutes between editing and posting. And I'm literally doing this. I pulled over on my drive to my dentist, and I'm gonna get it up. That's another really big thing that has changed for me. People are like, do you plan out your content? I do not plan out my content. I have an idea and I film it right away. That is my strategy. And even if I don't post it, I wanna get into the rhythm of just, like, idea, film, post, and I just wanna get, like, those reps in. Once I hit day 30, I was like, oh, I got this in the bag. I hit day 60, I hit day 90, I'm at, like, day 120. I don't even know where I'm at anymore. But I would say post, creating, like, some sort of gamified challenge to get you to post every single day, has been extremely helpful. And then the third and last thing, the most important thing, in fact, is I worked on the emotional baggage. For all of us, it's really the emotional block that gets in the way of posting. I'm sure we can all do hard things. If we really want something, we can set our mind and do it. But often times, like, there's some sort of emotional block that needs to be worked through or released. And for me, that was definitely the case. And I spent a lot of time with my life coach and journaling and thinking it all through. And I would say after I did, it's called a rim session. I did a rim session on this, and it was like, night and day. I work through the shit that I need to work through. I got over Like, the being seen and getting permission and embarrassment and love and all these different underlying issues that we all have. And once I did that, literally have not looked back. Been posting every single day with ease. Like, literally with ease. And sometimes I even, like, want to post. I'm like, oh, I don't know what I'm gonna post, but I can't wait to get on here and post something. So that's another really big thing. And then the last thing that I will say, more like practical tip. I focus heavy on my analytics. I post things that perform well because I am running a business, and I don't have a ton of time to spend on this, so I want to get the best bang for my buck. Let's do what's working and not do what's not working. So I spend about an hour on my analytics every single week, going through in depth and figuring out what works. For example, people love when my hair is in a slick back. I don't know why, but that always performs best. And so I. I kind of lean on that hairstyle a lot. I've Learned that talking videos where I talk to the camera for a long time, maybe don't get a ton of views, but they get more follower conversions. Look at your analytics. I will say, the opportunity that comes from TikTok is insane. Like, I. There's nothing that I have seen that is. Has, has Had this big of a return in my life. As far as opportunity goes, you're able to connect with people in a very different way. For example, yesterday, I was like, I need to find a technical designer who's literally down to just sit down and teach me how to do something. And within, like, an hour, I had five DMs. And I don't have a lot of followers. I have 25,000 followers. This sorority stuff, I don't know if you've been following, but I made, like, $20,000 in a couple of weeks through the sorority stuff, which was just, like, one video that got 7,000 views. You know, there's so much opportunity that comes from posting and putting yourself out there, so I highly recommend it. This was a longer video, but I hope it's helpful. I hope it gives you a little bit of encouragement just to, like. Doesn't need to be perfect. Just get in front of the camera, start talking, see what comes out. It's gonna be great. Okay, bye.", "cues": [[0.3, "i just hit 25 k on tiktok. woohoo!"], [4.3, "and i get a lot of questions from my friends about, like,"], [6.9, "how to post consistently on tiktok and, like,"], [9.2, "how i got here. and i want to make a little video on it with my."], [13.0, "the tips that have helped me the most,"], [14.9, "because six months ago, if you scroll back on my page,"], [18.1, "my content was not consistent."], [20.7, "i was not at the same following,"], [22.2, "and i just, like,"], [22.8, "was not where i am now. there are three main things that i did"], [25.5, "that have had the biggest impact."], [27.1, "so here they are. first off,"], [29.4, "i stions, it could be, well, it's just not worth the money question. So I could talk about the quality. Could be it's not the right Time I could talk about the seasonality and why it is the right time. Um, maybe you just need to be reminded again. So retargeting is also really important, and I feel like the ad for prospecting versus retargeting is different. Okay, so now what ads should I make? When I was first starting, I had no idea what was, like, actually a good ad, and I'm still kind of figuring it out, but I went to the meta ads library. Basically what? This is crazy cheat code. Can't believe it, like, exists, but you can basically see anyone's ads, like any brand. And so I just typed in really big brands like Doen and with Jean, and I just was looking at what their top performing ads are and what I noticed is most ads for them are simply just, like, a very beautiful image with their logo and then very simply what the item name is. So, like the Emma top, literally so simple. I was like, I can do this all day. And so that was my first add and it did really, really well. Once I got some confidence and I was like, okay, this actually works. I went through a couple ad iterations and I ended up landing on this ad, and this performed extremely well. Still is our best performing ad. Once you find the ad that's really working, you need to analyse what about it is working and the way that you can Do that is by testing. And so I tested this ad in two different formats. I want to figure out, is it the image that's really working or is it the copy that's working? And so I remade the ad, one with the same image, different copy, and the other one with the same copy, different image. And honestly, it was both. Both the copy and the image are winning ads for us. I've just created different variants of basically the same ad. Now let's move on to retargeting. So step 3, retargeting. This ad is very much an educational ad. So this is a video that I actually posted on TikTok a long akes a very, very long time to pack each order. And I think that's beautiful in the beginning stages, but as you start to get, like, 10 or 20 orders a day, that just doesn't work anymore. The ribbon is actually something I did right. I ordered these in really small quantities. Although I've had to reorder these a couple of times, I didn't have to front a ton of money by getting, like, a large amount of a discounted price. Because of that, I was able to test different ribbon styles, colours, lengths, get the smallest amount possible, even if it is a little bit more expensive, just because you're learning what you like. Let's talk about these gorgeous little cards. I had someone hand draw this, and it's absolutely beautiful. Her name is Haley. I had told her that I was going to put her name and my handle and her handle and all that stuff on the back of the card. But I was in such a rush getting these because I procrastinated, and I actually had to pay extra to get them, like, printed faster, that I completely forgot to do all of that. So that was another mistake. I ended up, like, making it right by posting a lot about it. Another mistake I made here is I really wanted, like, a matte card, like something Like this where it feels like matte, but this ended up being, like, glossy and shiny, which I still need to find a solution for that I need to find somewhere. If anyone knows places that print matte, let me know. And the last mistake and biggest mistake I made is with these mailers. Wow. I basically did everything wrong, which is, like, kind of how it goes in the beginning of having a business. The big mistake here is I ordered way too many of these, and they printed incorrectly. I did not get a sample before I printed them, and all these bows came out wrong, which is fine. It doesn't look the worst. But the real problem is I have so many of these units, and I changed my logo. Still gonna use it. But again, smart to have a small amount of these. Like, just go on U lin ch of orders,"], [122.3, "and that happened in the morning."], [124.0, "and, yeah,"], [124.7, "that was my tuesday. bye."]]}, {"id": "7648709024610815245", "title": "how to set your week up for success as a self employed business owner...", "views": 2992, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648709024610815245", "thumb": "/content/assets/thumbs/7648709024610815245.jpg", "transcript": "The older I've gotten, the more I've realised Sunday is the most important day of the week. It sets the tone for the entire week if you do it right, and it lets you kinda start the week off on the right foot. So this is what I do on my Sundays as a business owner. First off, we do, like, a whole house reset. We clean the whole house, we go grocery shopping. We just, like, set our living space up and our environment up for success. Second, I do a lot of, like, reflections and journaling. So I kind of like, reflect on my last week, what went well, what didn't, how am I feeling? Just like, vibe check, um, dream a little. Just like, set some intentions. And then I usually do some work. Like, I try to just get a head start on the week and do knock off some of those, easy things that are just lingering in the back of my mind so I can go on with, like, the heavy hitting projects on Monday. And then I plan the entire week out. So I kind of set my three. It ends up always being more than three, but I set my three priorities for the week. Like, the biggest things. If I do nothing else, I'll be so happy that I did these three things. And then I kind of plan my week out around The milestones I need to hit those things. what are the action items I need to do? I slot that into the calendar. Um, yoga, if I wanna go to yoga class, I try to slot that in. Meetings, hang out with friends. I just try to plan out, like, the skeleton of my whole week and, like, roughly what each day is meant to focus on. Because when you're running your own business, like, there's no one kinda, like, guiding you. You're just kinda picking yourself. So you need to motivate yourself and, like, make sure you're organised so you're always hitting the right tasks. And, yeah, that's how I spend my Sunday. I've been doing this for over a year and it's the most important thing for having a really good week.", "cues": [[0.1, "the older i've gotten,"], [1.1, "the more i've realised sunday is the most important day of the week."], [4.9, "it sets the tone for the entire week if you do it right,"], [7.9, "and it lets you kinda start the week off on the right foot."], [11.3, "so this is what i do on my sundays as a business owner."], [15.5, "first off, we do, like,"], [16.6, "a whole house reset. we clean the whole house,"], [18.8, "we go grocery shopping. we just, like,"], [21.3, "set our living space up and our environment up for success."], [25.4, "second, i do a lot of, like,"], [27.1, "reflections and journaling."], [29.0, "so i kind of like, reflect on my last week,"], [31.5, "what went well, what didn't,"], [33.1, "how am i feeling? just like,"], [34.5, "vibe check, um,"], [37.1, "dream a little. just like,"], [38.3, "set some intentions. and then i usually do some work."], [41.2, "like, i try to just get a head start on the week and do knock off some of those,"], [45.5, "easy things that are just lingering in the back of my mind so i can go on with,"], [49.2, "like, the heavy hitting projects on monday."], [51.4, "and then i plan the entire week out."], [54.0, "so i kind of set my three."], [55.8, "it ends up always being more than three,"], [57.3, "but i set my three priorities for the week."], [59.7, "like, the biggest things."], [60.5, "if i do nothing else, i'll be so happy that i did these three things."], [64.2, "and then i kind of plan my week out around the milestones"], [66.3, "i need to hit those things."], [67.7, "what are the action items i need to do?"], [69.5, "i slot that into the calendar."], [71.3, "um, yoga,"], [72.4, "if i wanna go to yoga class,"]  on the category that these two products are in. So, for example, we'll talk about me. Let's roast me for a second. I have a sleepwear brand. And there is a max that people are willing to spend when it comes to pajamas. At the end of the day, most people are like, I'll spend between 30 to 100 dollars on pajamas. When you start to get into, like, the really nice territory, like the eberjees of the world, the P J. Salvage, you're. You're talking, like, 120 150 for a pajama set, that's, like, really nice. And then if you wanna do, like, negative whipped or like, lunya washable silk, that's like 300, and that's groundbreaking. But you kinda max out at 300. The perception that people have is pajamas just shouldn't be that expensive. It doesn't matter how much it costs to make. If I took my pajama and said it was actually a going out outfit, immediately the price would go higher. I'm also seeing this to be the case with a nightgown versus a P J. Set. So I get this all The time, like, oh, it's a. It's a nightgown. Like, for the amount of fabric, it just shouldn't be that expensive. But if you were to do shorts and tanks like a P J. Set, I would spend much more on that. Which is interesting because from, like, a business perspective, it's pretty much the same amount of material cost, but people are willing to spend so much more on a P J. Set than they are a nightgown. Okay, so if that's true, then the reverse is also true, which is you can get into different industries that have a really low cost to produce the item, but you can sell it for so much more because, again, the perceived value. Fragrance. Amazing example of this. At the end of the day, it's a bottle of water and some essential oils. I'm simplifying, but the cost to make it is not that high. But the perceived value in the category, yeah, it's standard. It's $100 for a bottle, free for a bottle of perfume, $200, $300, depends, but that's a lot more acceptable. And so you don't have to, like, swim upstream and convince people why they should spend that much money. In fact, it would be a little bit confusing if the price was a lot lower. They would think it's like, poor quality or not as luxury or whatever. Skincare. Another really great example of this. I just thought of another one. Personalisation of any kind. So If, like, you're selling me a tank top, I don't wanna spend that much money on it. You're selling me a tank top with my name on it, immediately, I'm willing to spend more. Anything that's, like, customised, personalised, increases the perceived value immediately. Doesn't really even matter how much the cost is. This candle, for example, if I were to buy this candle as is, not spending that much, this candle with my name on it or my brand name on it. But just something that's been on my mind lately, perceived value based on the product category.", "cues": [[7.1, "because you can have two items that cost the same amount to make,"], [10.2, "and you can charge one for way higher,"], [11.8, "and the other one, you just cap out at a certain price."], [14.5, "and it's simply based on the category that these two products are in."], [18.4, "so, for example,"], [19.5, "we'll talk about me. let's roast me for a second."], [21.4, "i have a sleepwear brand."], [23.0, "and there is a max that people are willing to spend when it comes to pajamas."], [27.7, "at the end of the day, most people are like,"], [29.9, "i'll spend between 30 to 100 dollars on pajamas."], [34.1, "when you start to get into, like,"], [35.1, "the really nice territory,"], [36.5, "like the eberjees of the world,"], [38.3, "the p j. salvage,"], [39.4, "you're. you're talking, like,"], [40.3, "120 150 for a pajama set,"], [42.7, "that's, like,"], [43.2, "really nice. and then if you wanna do, like,"], [46.1, "negative whipped or like, lunya washable silk,"], [49.6, "that's like 300, and that's groundbreaking."], [52.1, "but you kinda max out at 300."], [54.1, "the perception that people have is pajamas just sh like I've gotten really good at this, and I wanna share how I structure my day and how I think about what to pick as a priority. The first one is I always think about things through leverage, and I always go for the thing that is the highest leverage. Anything that is low leverage, I cut out entirely and I don't do it. So examples? A low leverage task, even though everyone says I should be doing it, is posting on my brand's stories. For me personally, my clothing brand gets 50 views on stories, and stories live for 24 hours. With that hour chunk of time that I'd spend on stories, I can spend making a TikTok. And that TikTok get shown to 100,000 people and has a much higher impact. So the whole idea is like, you have one hour to spend on something. Pick the thing that is high leverage. Another thing with this is being okay to not do it all. I don't do it all. I cut A lot of things. We have to be very honest with ourselves. We don't have 100 million hours in the day. And I'm most concerned about doing the thing that is high leverage during my day, not doing everything during my day. This is point number two. it’s this concept of doing the one thing. It's based on a book, and last year I watched a YouTube video. I think it's by the creator, Deya. You can do 100 things during your day. During your day. But if you cut all those 100 things and you just do the one thing, doing that one thing would have an outsized impact on everything else. If you do the one thing, everything becomes easier and almost unnecessary in comparison. For example, last year, my one thing was to post on social media every single day. By doing that one thing and being able to reach that goal of growing on social media, everything else was so much easier in my life. last year I was freelancing and consulting a ton. That was, like, my form of income that paid the bills. This year, I haven't done any consulting work because all the energy that I put in last year on posting on social media is now paying off this year. Okay, the third and the last thing is I look at life through those quadrants on the top Left you have this is urgent and this is important. It needs to get done now and it's a very high leverage important task. And that always goes number one slot for me. So for example, right now, urgent and important is a P O. That I need to place in the next couple weeks to be able to make it in time for Q4. If I want to have a very successful holiday season. The decisions I make right now in the next couple weeks basically determine that. So that is priority number one, urgent, important. Everything I do is coming back to moving this forward. Important is the other section. Maybe it's not urgent, but I still prioritise it throughout my weeks. But it's not the number one priority, urgent, not important. These are things that I delegate out. I don't do. So posting on social media for my brand everyday, that is super urgent, like time sensitive, but it's not important that I do it. Last quadrant is things that are not important and not urgent, and those get cut. And you gotta be pretty vicious about your cuts and not feel guilty about them. It's okay to not do everything. Not everything is urgent and important. And also, things change by the week, by the month on what is urgent and important. They're dynamic. So you have to constantly be honest with yourself and not add guilt to your plate. When you're not doing something, don't do everything. The whole idea is like, you shouldn't be doing everything. You need to pick whatever is the highest leverage based off of your one thing. And then if you're getting stuck, use your quadrants to determine if it's important or urgent or if it should be cut or delegated. Okay, I hope that helps. Bye.", "cues": [[6.3, "we have fires to put out, we're being pulled in a hundred directions,"], [9.2, "and it can be really hard to figure out how to structure your day"], [11.6, "and what to prioritize. i feel like i've gotten really go getting people to like,"], [29.9, "buy into your brand. but building in public,"], [32.8, "this guilt that we all feel as entrepreneurs just starting out,"], [37.5, "it's too much. like,"], [38.6, "it's not necessary. building a personal brand,"], [42.6, "we can separate that entirely from building a public."], [44.9, "building a personal brand,"], [46.0, "i will die on that hill. is everyone should be building a personal brand"], [49.5, "in my personal opinion. i think it's so valuable."], [52.5, "i think it's opened up so many doors for me personally."], [56.2, "i think i would totally recommend building a personal brand."], [60.7, "but this idea that like,"], [62.7, "you need to feel guilty that you're not building in public"], [66.3, "and you're not posting a content"], [67.9, "even though, you know you should be posting content because that's what,"], [71.3, "that's that missing piece for your brand to succeed."], [73.7, "i just think it's an unreasonable amount of pressure to put on someone"], [77.5, "just starting out and juggling 100 things"], [79.4, "plus a full time job to get their business off the ground."], [82.0, "because i don't think people realise the undertaking that posting content is."], [85.8, "it's so time consuming. this is not like"], [88.0, "i'm gonna post a couple times for a couple weeks and then it's gonna pop off,"], [91.0, "like,"], [92.3, "think two years, everyday,"], [94.5, "three times a day."], [95.8, "and you gotta be iterating and getting better and better and building the skill."], [98.7, "if you, like,"], [99.3, "pick it up fast"], [100.3, "or you're naturally talented and you just build the skill really quickly,"], [104.3, "maybe you can post once a day,"], [106.1, "maybe you can post two or three times a week."], [108.0, "but realistically, like,"], [109.1, "if you want to really grow this thing,"], [111.9, "it's gonna take not just like,"], [113.6, "for the. i'll go to pick you up,"], [115.4, "but mainly for yourself to grow the skill of, like,"], [118.3, "what makes good content? how can i hook people in?"], [120.4, "how can i speak fast enough?"], [121.5, "how do. how do i get comfortable speaking in front of the camera?"], [124.0, "how can i keep my point concise?"], [125.3, "like, this has been two minutes."], [126.2, "i'm not concise enough. it."], [127.9, "but it's practice. it's practice and that's all."]]}], "playbooks": [{"id": "marketing-funnels-course", "type": "course", "title": "Marketing That Converts: A Beginner's Course", "topic": "Marketing & Sales Funnels", "tldr": "Okay so here's the thing: people rarely buy the first time they see you. This little course walks you through how customers actually convert, from getting discovered to closing the sale, so you can build a funnel (the path a stranger takes from never hearing of you to clicking buy) that turns followers into real buyers.", "outcome": "By the end of this course, you'll be able to map how customers really move from first glance to purchase, get discovered with aesthetic content, build trust over time, remove friction at checkout, create urgency that makes people act, and run a launch that actually sells out.", "meta": {"lessons": 6, "read_time": "~10 min"}, "lessons": [{"n": 1, "title": "How Buying Really Works", "est": "2 min", "body_md": "Okay so the biggest thing to wrap your head around: almost nobody buys the first time they meet you. At any moment only about 3% of your audience is ready to buy right now, and the other 97% are interested-ish but not ready yet. {{cite:7562768005504060727}} If you only ever shout \"buy now,\" you're talking to 3 people out of 100 and ignoring the rest.\n\nHere's the move. You build a funnel, which is just the path someone takes from \"never heard of you\" to \"adding to cart.\" The whole game is to discover the 97%, stay top of mind, and quietly warm them up so that when they finally are ready, you're the obvious choice. Conversion (someone actually buying) is almost never one moment, it's a slow build of little touches over weeks. {{cite:7588612579585576205}} So stop expecting the hard sell to work on a stranger. Plant the seed now, harvest later. Hope that helps."}, {"n": 2, "title": "Get Discovered", "est": "2 min", "body_md": "So how do strangers find you in the first place? Two flavors of ads, and they do different jobs. Vibe or discovery ads (also called brand awareness ads) are the aesthetic ones that just make you go \"ooh cute,\" no pressure to buy. Direct-response ads are the \"buy this now, here's 20% off\" ones. For brand new brands, vibe ads are gold because they get you in front of the 97% and make you top of mind without scaring anyone off. {{cite:7562768005504060727}}\n\nWhen someone taps that pretty ad, where do they land? Your Instagram. So your IG needs to be an aesthetic, cohesive vibe the second they arrive, because that's the moment they decide whether to follow. The pattern is honestly simple: beautiful ad, gorgeous product imagery, clean feed, they follow, and now you get to keep showing up in their world for free. {{cite:7562768005504060727}} Discovery isn't about selling, it's about being seen and looking like a brand worth following."}, {"n": 3, "title": "Build Trust and Nurture", "est": "2 min", "body_md": "Okay so now they follow you. This is where most people fumble. You nurture them, meaning you keep showing up over and over until they trust you enough to spend money. The most powerful tool here is building in public: documenting the messy, real process of making your product, the samples, the wins, the trials. People fall in love with the founder and the journey, not a faceless logo. {{cite:7610506080933793037}}\n\nA few things that move the needle. One, founder content, you on camera talking about why you made this, repeating your core message again and again (yes it feels repetitive to you, it's the first time for most viewers). Two, social proof, like filming yourself packing real orders and writing handwritten notes, because seeing other people buy makes new people feel safe buying too. {{cite:7588612579585576205}} Three, legitimacy builders like being in a real store or getting featured somewhere, which quietly tells people you're the real deal. Trust is the whole thing. Build it slow."}, {"n": 4, "title": "The Conversion Mechanics", "est": "2 min", "body_md": "So they're warmed up and ready. Now do NOT lose them at the finish line. The single biggest killer of sales is friction, anything that makes buying even slightly annoying. Fix this first.\n\nGet on Shopify and turn on Shop Pay (the one-tap checkout that already has their card and address saved). When someone's excited, you want them buying in literally seconds, before the doubt creeps in. A clunky checkout is where ready buyers go to change their mind. {{cite:7562768005504060727}}\n\nThen squeeze more from every sale with upsells, which is just showing them more stuff they might like while they already have their wallet out. \"You're buying the scarf? Here, you'll love this too.\" People who are already spending are the easiest people to sell to, so don't be shy about the \"add to cart, add to cart\" flow. {{cite:7562768005504060727}} And here's a small thing: once people are sold on the brand, a $5 shipping charge or a higher price barely registers. Don't obsess over being the cheapest. Make buying effortless and they'll happily spend."}, {"n": 5, "title": "Create Urgency", "est": "2 min", "body_md": "Here's the thing, even someone who really wants your product will sit on it for months if you give them no reason to act. I've literally wanted things for two months and just... not bought them. {{cite:7643220120097033485}} You have to give people a buying window: a clear reason to click the button now instead of \"someday.\"\n\nThe cleanest way as a small brand? Keep your MOQ (minimum order quantity, the smallest batch your manufacturer will make) low on purpose, so things genuinely sell out fast. When stuff sells out, it trains your customers that they need to move quickly next time, which is honestly a brilliant little sales tactic. {{cite:7562768005504060727}} This is the whole engine behind drop culture: limited drops, limited collabs, \"only available now.\" Scarcity is real here, not fake, and that's what makes it work. {{cite:7643220120097033485}} So instead of always-on, everything-in-stock, give people a deadline and a reason. \"Limited\" makes the wanting finally turn into buying."}, {"n": 6, "title": "Run a Sold-Out Launch", "est": "2 min", "body_md": "Okay let's put it all together into a launch that actually sells out. The secret isn't launch day, it's everything you do for the months before it.\n\nWhile you're developing the product (could be eight, nine months), you build in public the whole time and you capture every single interested person into a bucket. Run a waitlist and push everyone who interacts with you onto it. {{cite:7610506080933793037}} Stack a community on top, like a Discord (a free group chat app) where your most excited people hang out and feel like insiders. By launch day you might have thousands of primed, ready-to-go people instead of starting from zero. {{cite:7610506080933793037}}\n\nThen launch clean: one single drop date, product ready, everyone pointed at the same moment. That's how a brand new brand sells out hundreds of units on day one. {{cite:7610506080933793037}} And a sneaky-smart cash move, take pre-orders so customer money funds your next production run. You sell it before you have to fully pay to make more. That's the whole funnel, strangers to sold out. Hope it's helpful. Okay, bye."}], "glossary": [{"term": "Funnel", "def": "The path a person takes from never hearing of you to becoming a buyer. Each stage (discover, trust, convert) narrows the crowd down to actual customers."}, {"term": "Conversion", "def": "When someone actually takes the action you want, usually making a purchase. Rarely one moment, usually the result of many small touches over time."}, {"term": "Vibe / discovery ad", "def": "An aesthetic, no-pressure ad meant to get you noticed and followed, not to sell directly. Also called a brand awareness ad."}, {"term": "Direct-response ad", "def": "A sell-now ad with a clear call to action like a discount or a buy button. Works best on people already warmed up."}, {"term": "Building in public", "def": "Openly documenting the real, messy process of making your product so people connect with the journey and the founder."}, {"term": "Social proof", "def": "Evidence that other people are buying and loving your product (packing videos, reviews, notes) that makes new buyers feel safe."}, {"term": "Shop Pay", "def": "Shopify's one-tap checkout that saves a customer's card and details, so they can buy in seconds with almost zero friction."}, {"term": "Upsell", "def": "Offering a customer additional products while they're already buying, when their wallet is already out."}, {"term": "MOQ (minimum order quantity)", "def": "The smallest batch a manufacturer will produce for you. Keeping it low can help you sell out and create urgency."}, {"term": "Drop", "def": "A limited release of a product at a set time, often in limited quantity, designed to create urgency and demand."}, {"term": "Buying window", "def": "A clear reason and time frame for someone to buy now (a drop, scarcity, a deadline) instead of putting it off forever."}, {"term": "Waitlist", "def": "A list of interested people captured before launch, so you have a primed audience ready to buy on day one."}, {"term": "Pre-order", "def": "Selling a product before it's made, using customer payments to help fund the production run."}], "sources": ["7562768005504060727", "7610506080933793037", "7569048737557794061", "7588612579585576205", "7650223403613342990", "7648347420484586765", "7643220120097033485", "7649852300638309645", "7649119114908175629", "7648719143234981133"], "source_videos": [{"id": "7562768005504060727", "title": "just spent $200 and i’m not mad about it - love a little sales funne...", "views": 280800, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7562768005504060727", "thumb": "/content/assets/thumbs/7562768005504060727.jpg"}, {"id": "7610506080933793037", "title": "perfectly executed", "views": 182100, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7610506080933793037", "thumb": "/content/assets/thumbs/7610506080933793037.jpg"}, {"id": "7569048737557794061", "title": "does anyone know about comfrt’s marketing strategy?", "views": 164000, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7569048737557794061", "thumb": "/content/assets/thumbs/7569048737557794061.jpg"}, {"id": "7588612579585576205", "title": "notice how i didn’t mention influencer marketing or UGC @The Tooth Fa...", "views": 145100, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7588612579585576205", "thumb": "/content/assets/thumbs/7588612579585576205.jpg"}, {"id": "7650223403613342990", "title": "what do u think?", "views": 2564, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7650223403613342990", "thumb": "/content/assets/thumbs/7650223403613342990.jpg"}, {"id": "7648347420484586765", "title": "pov a brand in their masculine make first move energy and a customer ...", "views": 2314, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648347420484586765", "thumb": "/content/assets/thumbs/7648347420484586765.jpg"}, {"id": "7643220120097033485", "title": "love a non linear marketing funnel that actually converts", "views": 2169, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7643220120097033485", "thumb": "/content/assets/thumbs/7643220120097033485.jpg"}, {"id": "7649852300638309645", "title": "link in my bio @wearlucine 🤍🧺🪽🫖", "views": 1608, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649852300638309645", "thumb": "/content/assets/thumbs/7649852300638309645.jpg"}, {"id": "7649119114908175629", "title": "pov you are both business owners so every time you go shopping it bec...", "views": 1461, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649119114908175629", "thumb": "/content/assets/thumbs/7649119114908175629.jpg"}, {"id": "7648719143234981133", "title": "the hire is an extension and representative of the brand", "views": 1043, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648719143234981133", "thumb": "/content/assets/thumbs/7648719143234981133.jpg"}], "views": 280800, "reach": 783159, "n_sources": 10, "blurb": "How strangers become repeat buyers, step by step.", "card_title": "Marketing That Converts"}, {"id": "starting-a-brand-course", "type": "course", "title": "Start a Brand People Actually Buy: A Beginner's Course", "topic": "Starting a Brand", "tldr": "Okay so here's the thing: most brands fail because they start with a vibe instead of a real problem. By the end of this you'll know how to build one people actually reach for their wallet for.", "outcome": "By the end of this course, you'll be able to position a brand around a real problem, find a differentiator that makes people pick you, price for perceived value, land your first real sales, and get into boutiques and retail.", "meta": {"lessons": 5, "read_time": "~8 min"}, "lessons": [{"n": 1, "title": "The Right vs Wrong Way to Start", "est": "1 min", "body_md": "Okay so the wrong way to start a brand? Picking a vibe. You love an aesthetic, you wanna do loungewear or activewear or some cute barbiecore thing, and you obsess over the brand instead of the product. Honestly that's where most people get stuck {{cite:7566400853859405069}}.\n\nHere's the thing: unless you're a genuinely insane fashion designer (and if you are, this part isn't for you, go be a creative genius), a vibe alone won't cut through. Why would anyone buy from you over a brand they already know and trust that has thousands of reviews?\n\nThe right way is to start with a real problem and a real solution. A vibe is decoration. A problem-solution is a reason to buy. Look at Bombas, they cut into the totally saturated, kind of boring sock market just by listing everything wrong with socks and fixing it {{cite:7566400853859405069}}. That's the whole move. Solve something real, then dress it up in your aesthetic."}, {"n": 2, "title": "Find Your Differentiator", "est": "1.5 min", "body_md": "So a differentiator is just the one specific thing that makes you the obvious pick instead of one of a thousand options. And the cheat code is: it comes from a problem everybody quietly has.\n\nHere's how you find yours. Go look in your own closet, your own bathroom, your own life. What's annoying? What almost works but doesn't? That gap is your brand. Think vanity cases that stop your makeup and toiletries spilling everywhere and let it all stand up nicely, that's solving a real, specific issue, not selling a feeling {{cite:7566400853859405069}}.\n\nThen you take the aesthetic and you pair it with that solution, and all of a sudden you're good to go. Like a dainty feminine sleepwear line on its own? That doesn't grab anyone. But organic sleepwear that fixes the exact problem of wanting to sleep in your T-shirt while feeling frumpy in it? That's a reason {{cite:7566400853859405069}}. Problem first, vibe second. Good for thought."}, {"n": 3, "title": "Price for Perceived Value", "est": "2 min", "body_md": "Okay let's talk pricing, because this one trips everybody up. Two products can cost the exact same to make, and you can charge way more for one, purely based on the category it lives in {{cite:7642720084707888398}}.\n\nEvery category has a ceiling. People will pay a certain range for pajamas no matter how good they are, because the perception is pajamas just shouldn't cost that much. But fragrance? It's basically a bit of water and some essential oils, and nobody blinks at a hundred-dollar bottle, because the category says that's normal {{cite:7642720084707888398}}. Personalization does the same thing instantly: a plain tank is cheap, a tank with your name on it, suddenly you'll pay more.\n\nSo two moves. One: don't fight your category's ceiling, swim with it. Two: price high on purpose. You'll never out-cheap Target or Amazon, so don't play that game, your real market is the higher end {{cite:7540440233968471310}}. And there's a psychology to it: high price plus amazing packaging plus a real story plus genuinely good materials means people appreciate it more, wear it more, and tell everyone they love about it."}, {"n": 4, "title": "Get Your First Sales and Momentum", "est": "1.5 min", "body_md": "So how do you go from selling one thing every couple weeks to actually moving product? A few things move the needle the most {{cite:7649127274746367245}}.\n\nFirst, real photos. A legit photo shoot feels scary to invest in, but good imagery is the foundation everything else sits on, and one shoot can give you months of content that pays for itself in sales {{cite:7649127274746367245}}. You can do it cost-effectively, but do it.\n\nSecond, ads. Once you've got great photos to feed them, running ads is honestly the biggest lever for getting in front of new people. You don't need to be an expert to start, you just need it set up and running.\n\nThird, and this one's a mindset shift: act like the sales are already coming. Pre-wrap a bunch of orders so you're ready to ship the second they hit. Call it manifesting if you want, but really it flips your brain from hoping to deciding, and that's what gets you off the couch to do the shoot and the ads. You got this."}, {"n": 5, "title": "Get Into Boutiques and Retail", "est": "2 min", "body_md": "Okay so getting into stores. The single most important thing is a story, specifically a maker story {{cite:7540440233968471310}}. Woman owned, made in LA, named after your grandmother, whatever yours is. Boutiques sell off the story, every product moves when the owner tells people why it exists and why it helps them.\n\
