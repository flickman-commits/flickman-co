nThen packaging, because packaging is your brand. Your hang tags and labels are your business card, put the same care into them as the product itself. And keep it consistent: if you say 100% organic, your packaging better match, or it breaks trust {{cite:7540440233968471310}}.\n\nTo actually get in: cold DM, email, or call boutiques and offer a small amount of inventory on consignment (you give them stock for free, they pay you only for what sells, no risk for them). Make the packaging beautiful, write out the story, add a thank you card. If they love it, they reorder.\n\nSkip the old trade show route, it's like $5,000 a booth plus travel for one shot. Instead get on Faire, the online wholesale marketplace where boutiques find brands. No money up front, fast turnaround, and you replenish one to two weeks out instead of months in advance {{cite:7540440233968471310}}. And the majors like Nordstrom or Revolve? Honestly don't worry about that until you're two to three years in and your operations are flawless, because you get one shot and one mistake and you're out {{cite:7540440233968471310}}. Hope that helps. Okay, bye."}], "glossary": [{"term": "Differentiator", "def": "The one specific thing that makes your product the obvious choice over everything else, usually a real problem you solve that others don't."}, {"term": "Problem-solution (vs vibe)", "def": "Building a brand around a real, specific problem people have and fixing it, rather than just around an aesthetic or mood."}, {"term": "Perceived value", "def": "What people feel a product is worth based on its category, packaging, story, and quality, which can be far higher than what it actually costs to make."}, {"term": "Category ceiling", "def": "The max price people will pay for a product based purely on its category (for example pajamas), no matter how good or expensive to make it is."}, {"term": "Maker story", "def": "The personal origin story behind your brand (who made it, where, and why) that boutiques and customers buy into."}, {"term": "Consignment", "def": "An arrangement where you give a store inventory for free and only get paid when an item sells, so the store takes no risk to stock you."}, {"term": "Faire", "def": "An online wholesale marketplace where boutiques discover and order from brands, with no upfront cost and fast, replenish-as-you-go ordering."}, {"term": "Packaging-as-brand", "def": "Treating hang tags, labels, and wrapping as core brand assets that carry the same quality and story as the product itself."}], "sources": ["7540440233968471310", "7566400853859405069", "7649127274746367245", "7642720084707888398"], "source_videos": [{"id": "7540440233968471310", "title": "20 yrs of experience in 5 minutes", "views": 344400, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7540440233968471310", "thumb": "/content/assets/thumbs/7540440233968471310.jpg"}, {"id": "7566400853859405069", "title": "3 min ted talk on how to start a brand, break into the market, and ge...", "views": 259200, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7566400853859405069", "thumb": "/content/assets/thumbs/7566400853859405069.jpg"}, {"id": "7649127274746367245", "title": "documenting the whole journey of building a brand and my learnings al...", "views": 9632, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649127274746367245", "thumb": "/content/assets/thumbs/7649127274746367245.jpg"}, {"id": "7642720084707888398", "title": "if you want to start a brand ask yourself what is the standard price ...", "views": 2475, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7642720084707888398", "thumb": "/content/assets/thumbs/7642720084707888398.jpg"}], "views": 344400, "reach": 615707, "n_sources": 4, "blurb": "Turn an idea into a brand people actually buy.", "card_title": "Start a Brand People Actually Buy"}, {"id": "productivity-course", "type": "course", "title": "Run Your Week Like a Founder: A Beginner's Course", "topic": "Productivity & Prioritization", "tldr": "Okay so when no one is telling you what to do, the trap is doing a little of everything and moving nothing. This course gives you a simple, foolproof system: pick the highest leverage work, get brutally honest about what actually matters, plan your week on Sunday, and run your calendar like a to do list so the right tasks always get done.", "outcome": "By the end of this course, you'll be able to spot your highest leverage task, set three real priorities, plan your whole week on Sunday, time-block it into your calendar, sort everything through urgent vs important (and delegate or cut the rest), and stop letting overwhelm or perfectionism run the show.", "meta": {"lessons": 6, "read_time": "~9 min"}, "lessons": [{"n": 1, "title": "The Two Principles That Run Everything", "est": "2 min", "body_md": "Okay so here's the thing. When you're self employed, you have a hundred things you could focus on, and that is exactly why it gets so hard to know what you should actually be doing with your days. The whole system rests on two principles, and honestly it only works if you do both.\n\nOne: focus on your highest leverage task. Leverage just means the work that creates an outsized result compared to the effort you put in. Some tasks barely move anything. One or two of them move everything.\n\nTwo: be brutally honest with yourself about what is actually moving the needle (making real progress toward your goal) versus what just feels productive. {{cite:7651753096002964750}}\n\nThat honesty part is non-negotiable, because if you're not honest with you, you're never gonna get where you wanna go. So you might as well be so for real with yourself, make the changes, and get there. Everything else in this course is just how to put these two into practice. {{cite:7652849290619931918}}"}, {"n": 2, "title": "Find Your One Thing", "est": "1.5 min", "body_md": "So before you plan anything, you need to find your one thing. The idea is this: out of the hundred things you could do, there's usually one that, if you did it, would have an outsized impact on everything else. You cut the other ninety nine, you go all in on the one, and suddenly everything else gets easier and almost unnecessary in comparison. {{cite:7652849290619931918}}\n\nReal example: one year the one thing was posting on social media every single day. That single focus is what created momentum, and a year later it was still paying off, no consulting needed to cover the bills.\n\nTo find yours, ask: what is the one task that would make my whole life easier and pull everything else forward? Then be brutally honest. Don't pick the comfortable answer, pick the true one. That one thing becomes the anchor for your whole week. {{cite:7651753096002964750}}"}, {"n": 3, "title": "Plan the Week on Sunday (Top 3 Priorities)", "est": "1.5 min", "body_md": "Honestly, Sunday is the most important day of the week. It sets the tone, and it means come Monday you hit the ground running with a roadmap instead of wasting time figuring out what to do. {{cite:7648709024610815245}}\n\nHere's the flow. First, reflect and journal: what worked last week, what didn't, how are you feeling. Be brutally honest. Then map out your top three priorities for the week. Not ten, because ten is overwhelm. Not one, because honestly you can never really do just one. Three is fair.\n\nStuck on what your three are? Ask: what's the highest leverage thing I could do this week? And: if I looked back Friday, what's the one thing I'd really wish I had pushed forward? Those two questions surface your real priorities fast. Each big priority then breaks into mini tasks (send the email, update the doc, book the call), and those get scheduled next. {{cite:7651983263564614926}}"}, {"n": 4, "title": "Treat Your Calendar Like a To-Do List", "est": "1.5 min", "body_md": "Okay this one is the cheat code. Take every task from your three priorities and block off time for it directly in your calendar (this is time-blocking: giving each task a specific slot instead of a floating list). Before the week even starts, you've built a skeleton of what each day looks like. {{cite:7651753096002964750}}\n\nWhy it works: your to do list never gets too long, and everything on it actually gets done, because it's literally scheduled into a slot. Then add the smaller stuff too: meetings, admin, even yoga and workouts, because if you don't put it in the calendar it's literally not gonna happen.\n\nOne more trick: group similar tasks on the same day. There's a real switching cost (the mental tax of jumping between different kinds of work), so let Tuesday be all product, Wednesday all event, and go deep. And anything that doesn't get done that day? Before bed, you just move it over and slot it into the next day. Nothing falls through. {{cite:7651983263564614926}}"}, {"n": 5, "title": "The Urgent / Important Quadrants (and Delegating)", "est": "1.5 min", "body_md": "So now look at your whole workload through four quadrants: urgent and important, important but not urgent, urgent but not important, and neither. {{cite:7651753096002964750}}\n\nHere's how to play it. Urgent and important is always slot number one, the thing everything comes back to (like placing a production order in time for the holiday season). Important but not urgent still gets prioritized through your weeks, just not first. Urgent but not important is the trap: it feels pressing, but it doesn't matter that you personally do it, so you delegate it (hand it to someone who can do it well, like a social media manager). And neither urgent nor important? You cut it, and you have to be pretty vicious about your cuts.\n\nThe big shift: stop optimizing to do everything. Optimize for urgent and important, delegate or cut the rest, and don't add guilt to your plate for what you're not doing. These quadrants are dynamic too, so what's urgent shifts week to week. {{cite:7652849290619931918}}"}, {"n": 6, "title": "Beating Overwhelm and Perfectionism", "est": "1.5 min", "body_md": "Here's the thing about overwhelm: you do not need a full nine to five to be productive. You can get a shocking amount done in a focused two hour sprint, and honestly constraints often make you more productive because they force you to only touch the high leverage stuff. So if you're telling yourself you don't have enough time, you probably do, you just need to sprint. {{cite:7650515260226489614}}\n\nAnd then perfectionism, which quietly runs the show for a lot of us. There's a standard of excellence, and then there's spending nine months perfecting a pajama. The brands you compare yourself to have had a decade to make bad products and learn. There's a study where photography students graded on quantity (just take as many photos as you can) ended up with better photos than the ones chasing one perfect shot, because they got the reps in.\n\nThere is no end to perfectionism, you'll never reach perfect. So get some perspective, ship it, call it good enough, and learn along the way. {{cite:7645040246048001293}}"}], "glossary": [{"term": "Highest leverage task", "def": "The work that creates an outsized result for the effort you put in. A small number of tasks move almost everything; most don't."}, {"term": "Brutal honesty", "def": "Being so for real with yourself about what is actually moving the needle versus what just feels busy or productive. The system only works if you do this."}, {"term": "The one thing", "def": "The single task that, if you focused on it, would have an outsized impact and make everything else easier or even unnecessary in comparison."}, {"term": "Move the needle", "def": "To make real, measurable progress toward your goal (as opposed to activity that looks productive but changes nothing)."}, {"term": "Top 3 priorities", "def": "The three biggest things you want to accomplish in a week. Not ten (overwhelm), not one (too narrow to be realistic). Three is the sweet spot."}, {"term": "Time-blocking", "def": "Treating your calendar like a to do list by giving each task its own scheduled slot, so it actually gets done instead of floating on a list."}, {"term": "Switching cost", "def": "The mental tax you pay when you jump between different kinds of work. Grouping similar tasks together lets you go deep and avoid it."}, {"term": "Rolling tasks forward", "def": "Before bed, moving anything you didn't finish that day into the next day's calendar slot, so nothing falls through the cracks."}, {"term": "Urgent / important quadrants", "def": "A way of sorting work into four buckets: urgent and important (do first), important not urgent (prioritize), urgent not important (delegate), and neither (cut)."}, {"term": "Delegate", "def": "Handing a task that needs to get done but isn't your highest leverage to someone who can do it well, freeing your time for the work only you can do."}], "sources": ["7651753096002964750", "7651983263564614926", "7640965589623770382", "7652151779953577229", "7648709024610815245", "7650515260226489614", "7645040246048001293", "7652849290619931918", "7649120257918930189"], "source_videos": [{"id": "7651753096002964750", "title": "4 min ted talk on how to organize and optimize your week as a someone...", "views": 200100, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7651753096002964750", "thumb": "/content/assets/thumbs/7651753096002964750.jpg"}, {"id": "7651983263564614926", "title": "plan my week with me in 4 min! this is the exactly what i do every su...", "views": 4148, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7651983263564614926", "thumb": "/content/assets/thumbs/7651983263564614926.jpg"}, {"id": "7640965589623770382", "title": "comment if u hit ur goal last week + goal this week", "views": 3338, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7640965589623770382", "thumb": "/content/assets/thumbs/7640965589623770382.jpg"}, {"id": "7652151779953577229", "title": "lmk if u wanna see more videos like this 🩵💻", "views": 2996, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7652151779953577229", "thumb": "/content/assets/thumbs/7652151779953577229.jpg"}, {"id": "7648709024610815245", "title": "how to set your week up for success as a self employed business owner...", "views": 2992, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648709024610815245", "thumb": "/content/assets/thumbs/7648709024610815245.jpg"}, {"id": "7650515260226489614", "title": "in fact sometimes constraints make u even more productive!", "views": 2966, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7650515260226489614", "thumb": "/content/assets/thumbs/7650515260226489614.jpg"}, {"id": "7645040246048001293", "title": "and the only person who can decide if ur being perfectionist or not i...", "views": 2410, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7645040246048001293", "thumb": "/content/assets/thumbs/7645040246048001293.jpg"}, {"id": "7652849290619931918", "title": "3 min ted talk on how to structure your day to be based on high lever...", "views": 1400, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7652849290619931918", "thumb": "/content/assets/thumbs/7652849290619931918.jpg"}, {"id": "7649120257918930189", "title": "most of the time we just aren’t getting the word out there enough so ...", "views": 1308, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649120257918930189", "thumb": "/content/assets/thumbs/7649120257918930189.jpg"}], "views": 200100, "reach": 221658, "n_sources": 9, "blurb": "A simple system to run your week around what matters.", "card_title": "Run Your Week Like a Founder"}, {"id": "manufacturing-course", "type": "course", "title": "Make Your First Product: A Beginner's Course", "topic": "Manufacturing & Production", "tldr": "Okay so this is the no-jargon rundown of how a physical product actually gets made, so you can take your idea, find a manufacturer, and bring a first little run to life even if you have literally zero industry experience. Hope it helps.", "outcome": "By the end you'll honestly be able to turn an idea into a spec, source your materials, figure out where to make it, find and vet a maker, and get a small first run out the door. That's the whole thing.", "meta": {"lessons": 7, "read_time": "~10 min"}, "lessons": [{"n": 1, "title": "How a Product Actually Gets Made", "est": "2 min", "body_md": "Okay so here's the thing nobody really tells you: making a physical product isn't one step or one company. It's a chain of specialists that you coordinate. Let's use clothing as the example because it makes it click, and here's the cast:\n\n- **Fabric mill:** the company that literally makes your material by weaving or knitting it.\n- **Wholesaler:** where your **components / trims** come from (buttons, zippers, straps, lace, bows, all the little parts).\n- **Manufacturer (cut-and-sew):** takes your fabric and trims, **cuts** the pieces, then **sews** them into the actual finished thing.\n- **Agent:** an optional middle-person who connects you to all of the above and manages the whole chain for you, for a fee.\n\nSo the big idea, and honestly this is the part to really sit with: you bring the **ingredients** (fabric plus components) and the **recipe** (your spec), and the manufacturer assembles it all. {{cite:7521588330153200951}} Once you get who does what, everything else in this course builds right on top of it. You know what I mean?"}, {"n": 2, "title": "Choosing Where to Manufacture", "est": "2 min", "body_md": "Okay so where you make your product changes basically everything: cost, quality, and how much of a headache it is to manage. The concept to know here is **vertical integration**, which just means whether one facility handles most of the steps in-house, or whether it's a bunch of separate vendors each doing one little piece.\n\n- **Domestic (think LA or New York):** honestly the easiest place to learn, because you can go visit the floor, touch the product, ask questions in person. {{cite:7646240181225327886}} But it's expensive (labor and living costs are high) and it tends to be really **fragmented**, meaning separate vendors weave, dye, cut, sew, and supply your trims, and each one takes a cut, which bumps the price up and kind of falls apart if any single link runs out. Great as a learning stepping stone, just harder to scale.\n- **Overseas (China, Turkey, Portugal):** usually way more vertically integrated, with stronger infrastructure and more consistent quality once you're making a lot. China and Turkey are kind of the heavy hitters for technology and capacity. The tradeoffs: **tariffs** (basically import taxes), the distance, and it being harder to keep an eye on things in person. {{cite:7521588330153200951}}\n\nSo a super common path is starting domestic to learn the ropes, then moving overseas once you're ready to scale. That's it."}, {"n": 3, "title": "Turning Your Idea Into a Spec", "est": "2 min", "body_md": "Okay so a manufacturer literally can't read your mind, they need exact instructions. That document is called the **tech pack**, and it's basically the recipe for your product.\n\nA tech pack usually has:\n\n- A **sketch** of the piece.\n- **Measurements** for every part (like waist 25 inches, length, and so on).\n- **Grading:** how those measurements step up and down across sizes (XS, S, M, L). Grading is honestly what makes a size run actually consistent.\n- A **bill of materials:** the full list of fabric and components going into it.\n\nYou can totally learn to build a tech pack yourself, or you can hire a **freelancer** who sketches it out and adds the measurements and grading for you. Either is fine.\n\nAnd here's a little tip: pair your tech pack with a **reference sample**, which is just an existing product that's close to what you want, so the maker has a real physical target to aim at. {{cite:7651733039298399501}} You can also pull design inspiration from clothes you already own and love. Easy."}, {"n": 4, "title": "Sourcing Your Materials", "est": "1 min", "body_md": "Okay so before anything gets sewn, you need your raw ingredients actually in hand:\n\n- **Fabric** comes from a **fabric mill**, the people who weave or knit it. And heads up: one single material can come in a ton of variations that all look and feel kind of different, so test your options before you commit. {{cite:7651733039298399501}} Making fabric takes a while (often around five weeks), so order it early, like early early.\n- **Components / trims** come from a **wholesaler**: buttons, zippers, adjustable straps, lace, bows, all those small parts.\n\nDon't sleep on the parts that actually touch the body. Labels, for example, can be super itchy, and upgrading to a soft seamless label genuinely changes how the whole thing feels.\n\nIf chasing all of this yourself sounds like a lot, an **agent** can source the fabric and components for you. But honestly doing it yourself saves money and teaches you the supply chain, which is kind of priceless when you're starting out."}, {"n": 5, "title": "Samples, MOQs & Production Runs", "est": "2 min", "body_md": "Okay so once the manufacturer has your tech pack and materials, they make a **pattern**, lay it on the fabric, cut, and sew a **sample** (also called a prototype). Then you review it really carefully: check the fit, the length, the sleeves, the overall feel. {{cite:7648068198830525710}} And honestly expect to redo samples a few times until it's right, that's totally normal. Only once the sample is approved do you move into full production.\n\nNow a term you're gonna hear constantly: **MOQ, minimum order quantity**, which is just the smallest number of units a vendor will make for you. First runs of around **300 units** are pretty common (kind of the medium standard). But small runs are very very possible, even big established brands do test runs as small as **50 units** to see what actually sells before committing to thousands. {{cite:7550159488783797517}}\n\nSo start small. A first run of **50 to 200 units** lets you test what works and keeps your risk low while you're still learning. Same goes for packaging: buy small so you can test and adjust as you go."}, {"n": 6, "title": "Finding & Vetting a Manufacturer", "est": "2 min", "body_md": "Okay so real talk, this industry is fragmented, relationship-driven, and honestly kind of hard to navigate. A lot of manufacturers don't even have a real website and aren't easy to look up. It really does run on who you know. {{cite:7550159488783797517}}\n\nWays to actually find makers:\n\n- **In person:** if you're anywhere near a manufacturing hub, go tour the local factories. Seeing the floor and the machines up close is basically a crash course in how things get made. {{cite:7646240181225327886}}\n- **Online marketplaces** (like Alibaba) exist, but you've gotta vet carefully, so expect some trial and error.\n- **Agents** can totally shortcut the search and smooth the whole thing out.\n\nWhat to expect while you're vetting:\n\n- Replies are often slow, and some vendors will just **ghost** you or never follow up with pricing. It's annoying but normal.\n- Not every maker is good, so talk to several before you commit to anyone.\n- **Timelines:** finding the right partner can honestly take months. And once you're in production, fabric (around 5 weeks) plus cut-and-sew (around 5 to 6 weeks) means roughly two months to actually produce a garment, on top of the search.\n\nAnd if you genuinely can't visit a factory anywhere, take a sewing class so you understand how the thing gets built. Good for thought."}, {"n": 7, "title": "Packaging & Finishing Your Brand", "est": "1 min", "body_md": "Okay so packaging is where the product turns into an actual experience, and it's so easy to overspend right out of the gate. Build it to test and scale, not just to look gorgeous one single time.\n\nThe key lessons:\n\n- **Order trims like hang tags early.** Your manufacturer can attach them during production, but miss that window and you'll be doing it by hand. {{cite:7644674043496434958}}\n- **Keep printed stuff generic until you're sure.** Printing \"Made in LA\" or an old logo locks you in, minimums are high, and you can't reuse any of it if something changes. Only print what's gonna stay stable across runs.\n- **Always get a sample before a big print order.** Bulk runs print wrong sometimes, and then you're just stuck with the inventory.\n- **Buy small, even at a higher per-unit price.** Stuff like ribbon ordered in little batches lets you test styles and colors without fronting a ton of cash on one big discounted lot.\n- **Watch your efficiency.** Hand-wrapping in tissue feels luxe at a few orders a day, but it completely collapses at 10 to 20. Lean toward simpler, faster options (like compostable mailers) as you grow. {{cite:7648716643790507278}}\n\nAnd honestly, just treat the early mistakes as lessons. You only learn this kind of nuance by actually doing it. Okay, that's everything. Good luck."}], "glossary": [{"term": "Tech pack", "def": "The spec document for your product: a sketch plus measurements, grading, and a materials list that tells a manufacturer exactly what to make."}, {"term": "MOQ (minimum order quantity)", "def": "The smallest number of units a vendor will make or sell you in one order."}, {"term": "Grading", "def": "Scaling a product's measurements up and down so you get a consistent size run (XS, S, M, L)."}, {"term": "Fabric mill", "def": "The company that actually makes your fabric by weaving or knitting it."}, {"term": "Cut-and-sew", "def": "A manufacturer that takes your fabric and trims, cuts the pieces, then sews them into the finished product."}, {"term": "Trims / components", "def": "The small parts that go into a product: buttons, zippers, straps, lace, bows, labels."}, {"term": "Wholesaler", "def": "A supplier you buy components and trims from in bulk."}, {"term": "Agent", "def": "A broker who connects you to mills, wholesalers, and manufacturers and manages the chain for a fee."}, {"term": "Vertically integrated", "def": "When one facility handles most of the production steps in-house instead of spreading them across a bunch of separate vendors."}, {"term": "Reference sample", "def": "An existing product similar to what you want, handed to a manufacturer as a physical target to aim at."}, {"term": "Sample / prototype", "def": "A first made-to-spec version of your product that you review and refine before going into full production."}, {"term": "Bill of materials", "def": "The complete list of fabrics and components used to make a product."}, {"term": "Tariffs", "def": "Taxes charged on goods imported from another country, which raise the cost of making things overseas."}, {"term": "Pattern", "def": "The template a manufacturer creates from your tech pack to lay on the fabric and cut the pieces."}], "sources": ["7550159488783797517", "7521588330153200951", "7646240181225327886", "7644674043496434958", "7648716643790507278", "7651733039298399501", "7648068198830525710"], "source_videos": [{"id": "7550159488783797517", "title": "4 min rundown from @Alex Doyle founder of 7 figure brand pearled ivor...", "views": 110700, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7550159488783797517", "thumb": "/content/assets/thumbs/7550159488783797517.jpg"}, {"id": "7521588330153200951", "title": "5 min rundown on clothing manufacturers and what to expect when start...", "views": 82600, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7521588330153200951", "thumb": "/content/assets/thumbs/7521588330153200951.jpg"}, {"id": "7646240181225327886", "title": "finally feel like i unlocked a new level on building the biz! learnin...", "views": 6141, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7646240181225327886", "thumb": "/content/assets/thumbs/7646240181225327886.jpg"}, {"id": "7644674043496434958", "title": "lmk which part you like most so i can include it for our next drop", "views": 5346, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7644674043496434958", "thumb": "/content/assets/thumbs/7644674043496434958.jpg"}, {"id": "7648716643790507278", "title": "4 min ted talk on mistakes i made with packaging for my brand. this i...", "views": 4145, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648716643790507278", "thumb": "/content/assets/thumbs/7648716643790507278.jpg"}, {"id": "7651733039298399501", "title": "lmk what u think 🤭", "views": 2047, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7651733039298399501", "thumb": "/content/assets/thumbs/7651733039298399501.jpg"}, {"id": "7648068198830525710", "title": "which color 🩵💗🤍", "views": 1649, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648068198830525710", "thumb": "/content/assets/thumbs/7648068198830525710.jpg"}], "views": 110700, "reach": 212628, "n_sources": 7, "blurb": "Take an idea and get a real product made.", "card_title": "Make Your First Product"}, {"id": "content-growth-course", "type": "course", "title": "Grow an Audience From Zero: A Beginner's Course", "topic": "Content & Audience Growth", "tldr": "Okay so here's the thing: growing an audience isn't about cracking the algorithm, it's about becoming a person who actually posts. This course walks you (the busy, introverted, camera-shy you) from never posting to posting daily, beating perfectionism, and doubling down on what works.", "outcome": "By the end of this course, you'll be able to post consistently, get comfortable on camera, read your own analytics, and grow a real audience without burning out or waiting until your content is perfect.", "meta": {"lessons": 6, "read_time": "~9 min"}, "lessons": [{"n": 1, "title": "Why distribution is the whole game", "est": "1 min", "body_md": "Okay so before anything else, you need to get this one belief in your head: distribution is the most important thing. You can have the best product or idea in the world, but if nobody sees it, it doesn't matter. That's why posting is worth taking seriously.\n\nAnd honestly, here's the part nobody tells you. You are not training the algorithm. You are training yourself. People obsess over posting at the perfect time to make the algorithm like them, but that's not how it works. {{cite:7644253198542212366}} Every time you film a video, talk to the camera, and click post, you're getting a rep in. The more reps, the better your content gets, and better content is what actually performs.\n\nSo stop trying to crack a secret code. There isn't one. There's just you, getting better. Hope that helps."}, {"n": 2, "title": "Build the habit (accountability + a 30-day challenge)", "est": "2 min", "body_md": "Okay so the habit is everything, and you don't build it on willpower. You build it on structure. Two things that work:\n\nFirst, an accountability group. Get yourself plus two or three other people who want to post into a group chat, hop on a weekly call, and each say whether you posted or not. {{cite:7551283785891908877}} The magic isn't tips and tricks, it's that being out of integrity in front of your peers becomes more cringe than actually posting. That flips the whole thing for you.\n\nSecond, a gamified 30-day challenge. Pick a goal that is 100% in your control: post every single day. Not views, not followers (you can't control those), literally just post. It can be bad. Doesn't matter, as long as it goes up. {{cite:7640219884030332174}} Run a little streak, hit day 30, and it becomes a routine you don't even think about.\n\nOne mindset trick ties it together: adopt the habits of who you want to become. If you had two million followers, you'd post daily, no skipped weeks. So act like that person now. Your content doesn't have to be great yet, your habits can be solid, and practice does the rest."}, {"n": 3, "title": "Idea to film to post (beat perfectionism and the camera)", "est": "2 min", "body_md": "Here's the thing about \"I don't have time\": you don't have time for the slow, perfectionist way. You have plenty of time for the fast way, and the fast way is one workflow: idea, film, post. No planning. {{cite:7551283785891908877}} You get an idea, film it right away, put it up. A whole video can take 15 minutes, not hours.\n\nThe move that makes this possible is the one-take, no-cuts video. {{cite:7640219884030332174}} Hit record, talk for 60 seconds, post whatever comes out. Early ones won't be your best and that's completely fine. They'll get a few hundred views and you'll build the muscle. The camera fear is real (we all forget how to talk the second it turns on) and the only fix is exposure therapy: do it daily until it stops feeling scary.\n\nBut honestly, the deepest blocker isn't time or skill, it's emotional. For most of us there's some emotional block: fear of being seen, needing permission, embarrassment. {{cite:7551283785891908877}} You have to actually work through that. Journal on it, talk it out, get to the root. Once you release it, posting gets genuinely easy. And pls don't feel guilty if this part takes a minute, it's the real work."}, {"n": 4, "title": "What to actually post (hooks and what performs)", "est": "2 min", "body_md": "Okay so what do you actually film? Start simple and lean on a visual hook (the eye-catching thing in the first second that stops the scroll). It can be a bold prop, a bright product, a faceless six-second clip against a blank wall. {{cite:7652506313808776461}} Simple beats fancy almost every time, and the on-screen text should be short: just call out the thing you're showing.\n\nA format that reliably works for a personal brand: a talking head, filmed in a real-life setting (your kitchen, your car, your bedroom), holding a relevant prop, delivering one tactical takeaway in under 90 seconds. {{cite:7643631553939131662}} Keep it concise and keep it useful.\n\nAnd repeat your core messages over and over. The brands that pop off aren't constantly reinventing themselves, they hammer the same simple message until it sticks. Different videos, same heartbeat. That repetition is what makes you memorable, so don't be scared of saying the same thing again."}, {"n": 5, "title": "Use your analytics to double down", "est": "1 min", "body_md": "Okay so once you've got data (a few weeks of posting), you stop guessing and start reading. Spend about one hour a week, every week, going deep on your analytics. {{cite:7551283785891908877}} You're a busy person, so you want the best bang for your buck: do more of what's working, cut what isn't.\n\nThe framework here is the 75/25 idea. Look at your insights, find your top performers, and make that your 75% for next week. Anything that flopped gets cut (don't keep making videos that don't work). For your winners, find the pattern: was it the format, the length, the on-screen text, the topic? Then repeat that pattern. {{cite:7643631553939131662}} The other 25% is new, fun, experimental stuff. Over time your best experiments become the new 75%, and you're in an upward spiral of better and better content.\n\nOne nuance: different videos do different jobs. Some get views, some get fewer views but way more follower conversions (people who actually hit follow). Both matter, so watch for both. Look at your own numbers and let them tell you what to make next."}, {"n": 6, "title": "Work smarter with systems and AI", "est": "1 min", "body_md": "Honestly, going through every video to spot patterns is a lot of work, so let AI do the heavy lifting. Go to your profile, sort by top-performing, screenshot your best videos, and drop them into an AI tool like Claude. Explain the 75/25 method, hand it the screenshots, and ask it to find the patterns. {{cite:7643631553939131662}} It'll group your winners and basically hand you your own award-winning format: the setting, the length, the structure that keeps working for you. Then you just make more of that.\n\nThe bigger lesson: this is a long game. Growing a real audience is more like two years of showing up than a few weeks of going viral, so build systems that make the daily reps sustainable. {{cite:7640222732872862989}} Lean on your accountability group, your idea-film-post workflow, your weekly analytics hour, and AI to cut the busywork.\n\nAnd one last thing: pls don't feel guilty if you don't want to post every day. {{cite:7648344501597015310}} Drop the heavy goal if it's killing the fun, keep it light, keep it consistent, and it'll grow. Okay, bye, you've got this."}], "glossary": [{"term": "Distribution", "def": "Getting your content (and product) in front of people. The priority. A great idea nobody sees doesn't grow anything."}, {"term": "Accountability group", "def": "A small group (you plus two or three others) who check in weekly on whether everyone posted, making not-posting the cringe option."}, {"term": "30-day challenge", "def": "A gamified sprint where the goal is to post every single day for 30 days. The goal is 100% in your control, unlike views or followers."}, {"term": "Reps", "def": "Repetitions. Each video you film and post is a rep that makes you better, the way practice makes anything better."}, {"term": "Idea, film, post", "def": "A no-planning workflow: get an idea, film it right away, put it up. Keeps you fast and kills perfectionism."}, {"term": "One-take video", "def": "A single, unedited, no-cuts clip. Hit record, talk, post. The fastest way to build the camera muscle."}, {"term": "Emotional block", "def": "The fear of being seen, judged, or embarrassed that quietly stops you from posting. Usually the real obstacle, not time."}, {"term": "Visual hook", "def": "The eye-catching thing in the first second (a prop, a bright product, a striking shot) that stops the scroll."}, {"term": "Talking head", "def": "A video where you talk straight to the camera in a real setting, usually delivering one quick, useful point."}, {"term": "Analytics / insights", "def": "The performance data on your posts (views, follower conversions, etc.) that tells you what's working."}, {"term": "75/25 method", "def": "Make 75% of next week's content from patterns in your top performers, and 25% from new experiments. Winners replace winners over time."}, {"term": "Follower conversions", "def": "When a video turns viewers into people who actually hit follow. Some low-view videos convert way better than high-view ones."}], "sources": ["7644253198542212366", "7551283785891908877", "7643631553939131662", "7645397162683092237", "7640219884030332174", "7652506313808776461", "7648344501597015310", "7640222732872862989"], "source_videos": [{"id": "7644253198542212366", "title": "based on my last year of posting multiple times everyday", "views": 82300, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7644253198542212366", "thumb": "/content/assets/thumbs/7644253198542212366.jpg"}, {"id": "7551283785891908877", "title": "if u feel like u don’t have time to post in your day, are a major int...", "views": 70300, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7551283785891908877", "thumb": "/content/assets/thumbs/7551283785891908877.jpg"}, {"id": "7643631553939131662", "title": "tactical breakdown + how to use ai to do it for you", "views": 6646, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7643631553939131662", "thumb": "/content/assets/thumbs/7643631553939131662.jpg"}, {"id": "7645397162683092237", "title": "need your help! what should we hand embroider to make this extra spec...", "views": 3955, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7645397162683092237", "thumb": "/content/assets/thumbs/7645397162683092237.jpg"}, {"id": "7640219884030332174", "title": "Replying to @•Y• Interior Designer/Traveler it’s okay if u don’t feel...", "views": 2942, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7640219884030332174", "thumb": "/content/assets/thumbs/7640219884030332174.jpg"}, {"id": "7652506313808776461", "title": "lmk if this is helpful and i can make more 🩵", "views": 1374, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7652506313808776461", "thumb": "/content/assets/thumbs/7652506313808776461.jpg"}, {"id": "7648344501597015310", "title": "downsides of having massive goals for the year", "views": 966, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648344501597015310", "thumb": "/content/assets/thumbs/7648344501597015310.jpg"}, {"id": "7640222732872862989", "title": "pls don’t feel guilty if u don’t want to post as a small biz owner", "views": 933, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7640222732872862989", "thumb": "/content/assets/thumbs/7640222732872862989.jpg"}], "views": 82300, "reach": 169416, "n_sources": 8, "blurb": "Go from never posting to growing every day.", "card_title": "Grow an Audience From Zero"}, {"id": "mindset-course", "type": "course", "title": "The Founder Mindset: A Beginner's Course", "topic": "Mindset & Founder Journey", "tldr": "Okay so the part of starting a business nobody really teaches you is the inner game: how to build momentum from zero, make peace with money, stop letting fear of being seen run the show, and keep going after something blows up. This is everything I got for you on that, brain to yours.", "outcome": "By the end of this course, you'll be able to build momentum from a standing start, reframe a goal so big it's paralysing, shift into an abundance money mindset, push through the fear of putting yourself out there, balance the two energies that actually run a business, and bounce back when something fails.", "meta": {"lessons": 6, "read_time": "~9 min"}, "lessons": [{"n": 1, "title": "Momentum Is Everything", "est": "2 min", "body_md": "Okay so here's the thing about big goals: when you're at zero, a number like '10k a month' is so abstract it actually freezes you. You sit there theorising, planning, googling, and you make literally no progress. So flip it. Instead of one scary number, chase compounding wins. Week 1 make $50. Week 2 double it to $100. Then $200, $400, $800, and so on. Surely you can figure out fifty bucks in a week, right? That you can actually go do today. {{cite:7585259043288141069}}\n\nWhat small numbers give you is specificity. $50 this week doesn't mean 'apply to jobs and see what happens,' it means literally go make $50, which creates urgency. And honestly the magic isn't the money, it's the momentum. Each tiny win makes you feel in control and taking action, and that feeling is what carries you into the bigger weeks. Get the ball rolling first. Everything else compounds from there. {{cite:7649503500350557453}}"}, {"n": 2, "title": "Reframe Big Goals So They Feel Doable", "est": "1.5 min", "body_md": "So once you've got momentum, here's how you keep aiming high without spiralling: shrink the goal down to something that's 100% in your control. When you chase views, followers, or revenue, you're chasing outcomes you can't fully control, and that's where the overwhelm lives. Instead, gamify it. Give yourself a 30 day challenge with a goal that only depends on you, like 'post every single day, it can be shit, doesn't matter, just get it up.' A little sprint creates momentum and makes the whole thing fun. {{cite:7585259043288141069}}\n\nTight parameters also make decisions fast. When you give yourself 30 days instead of unlimited time, you stop generating 100 options and just pick the one that's good enough and go. Speed forces clarity. And don't be precious about it being perfect, things being a stepping stone is completely okay. You can always pivot along the way. {{cite:7647542718872227086}}"}, {"n": 3, "title": "Money and the Abundance Mindset", "est": "1.5 min", "body_md": "Okay so this one's a little woo but stay with me, because it's real. Scarcity mindset (believing there's a tiny, fixed pie and someone else's win is your loss) makes you play small and weirdly competitive. Abundance mindset is the opposite: unlimited seats available, no shortage, plenty for everyone. Notice how some people are already speaking in gigantic terms while they're literally at zero. That belief isn't delusion, it's the starting line, because what you genuinely believe is possible for yourself tends to become the reality you build toward. {{cite:7642387725575785741}}\n\nAnd here's the practical side so this doesn't turn into magic thinking: manifesting is real but it's not actually magic. Take action as if the thing has already happened, get your energy into the mindset the goal requires, and then do the unglamorous work to back it up. Decide you're going to sell the thing, then go iterate until it sells. Belief plus reps. That's the combo. {{cite:7647276000031575310}}"}, {"n": 4, "title": "Work Through the Fear of Being Seen", "est": "1.5 min", "body_md": "Here's the honest truth nobody says out loud: the thing blocking you from posting, pitching, or putting yourself out there usually isn't time and it isn't skill. It's emotional. We can all do hard things when we really want to, so when you keep not doing it, there's almost always an underlying block: fear of being seen, needing permission, embarrassment, all that stuff we carry. You have to actually work through it, whether that's journaling, a coach, whatever gets it out. Once you release it, you literally don't look back, posting becomes easy. {{cite:7649494825548401933}}\n\nTwo things that help in the meantime. One, accountability: it's more awkward to be out of integrity in front of peers than it is to just do the scary thing, so let that pressure work for you. Two, remember the difference between you and the people you admire is mostly their willingness to do uncomfortable things even when they don't want to. So get comfortable being uncomfortable, and do it anyway. {{cite:7652435004882046221}}"}, {"n": 5, "title": "Masculine vs Feminine Energy in Business", "est": "1.5 min", "body_md": "Okay so this isn't about men versus women, it's about two energies that every founder needs to balance. The 'masculine' mode is dreaming big, speaking in huge terms, focusing on your own race, and using other people as benchmarks instead of threats. A lot of us (women especially, in my experience) default to playing safe, spending a ton of mental energy comparing and quietly putting others down. That energy is just leaking out of your own business. You could take all of it and use it to bring your business up instead. {{cite:7642387725575785741}}\n\nThe 'feminine' mode matters just as much: slowing down enough to make a decision you can grow with, caring about quality, building for repeat customers and the long run. The trap is living only in one. Pure speed gets you a product but maybe not a sustainable one. Pure caution leaves you stuck in sampling for six months going slowly mad. Learn to toggle: dream big and move fast, but choose with care. {{cite:7647542718872227086}}"}, {"n": 6, "title": "Resilience: Failing and Starting Again", "est": "1.5 min", "body_md": "So here's the reframe that changes everything about failure and rejection: it's not personal. When you shut something down or hear a no, it feels like you got rejected, but rejection has nothing to do with you, it has everything to do with the offer. Detach yourself from it and put that energy into making an offer so full of value people can't say no. Even shutting down a business you poured years and savings into can turn out to be the best thing you ever did, because it frees you to rebuild. {{cite:7649503500350557453}}\n\nThree ways to hold a 'no': if you never hear it, you're playing too small, so a no means you're pushing at the right level. Any misdirection is just a redirection toward the right thing. And success isn't only hard work or luck, it's how much you pivot. Find the 1% that's working, make tiny tweaks toward it every day, double down, and you'll trend upward. Keep going. {{cite:7649853873749773581}}"}], "glossary": [{"term": "Momentum", "def": "The feeling of progress and control you get from stacking small wins, which makes bigger goals feel reachable instead of scary."}, {"term": "Compounding growth", "def": "Setting a small starting goal and roughly doubling it each period (like $50, then $100, then $200) so progress builds on itself."}, {"term": "Abundance mindset", "def": "Believing there's plenty of opportunity for everyone (unlimited seats), so someone else winning doesn't mean you lose."}, {"term": "Scarcity mindset", "def": "Believing the pie is tiny and fixed, which makes you play small and treat peers as competition instead of inspiration."}, {"term": "Manifesting", "def": "Acting and feeling as if your goal has already happened to get your mindset right, always paired with the actual work to make it real."}, {"term": "Highest leverage task", "def": "The one thing that, if you did it, would have an outsized impact on everything else."}, {"term": "One-way door", "def": "A decision that's hard or impossible to reverse, so it deserves more care than a reversible (two-way door) choice."}, {"term": "Reps", "def": "Repeated practice. Doing the scary or hard thing over and over until you actually get good at it."}], "sources": ["7585259043288141069", "7649503500350557453", "7642387725575785741", "7647264292412067086", "7652435004882046221", "7647276000031575310", "7647542718872227086", "7649494825548401933", "7641350341979655438", "7649853873749773581"], "source_videos": [{"id": "7585259043288141069", "title": "lemme know if u have questions on how u can apply this to ur life to ...", "views": 148500, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7585259043288141069", "thumb": "/content/assets/thumbs/7585259043288141069.jpg"}, {"id": "7649503500350557453", "title": "lesson of today shared at the end 🩵", "views": 3110, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649503500350557453", "thumb": "/content/assets/thumbs/7649503500350557453.jpg"}, {"id": "7642387725575785741", "title": "5 min ted talk on the differences i see between my partner who is a b...", "views": 2841, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7642387725575785741", "thumb": "/content/assets/thumbs/7642387725575785741.jpg"}, {"id": "7647264292412067086", "title": "busy busy", "views": 2588, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7647264292412067086", "thumb": "/content/assets/thumbs/7647264292412067086.jpg"}, {"id": "7652435004882046221", "title": "it’s about finding the thing that is winning and then doubling down. ...", "views": 2303, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7652435004882046221", "thumb": "/content/assets/thumbs/7652435004882046221.jpg"}, {"id": "7647276000031575310", "title": "a little magic and some hard work does the trick", "views": 2287, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7647276000031575310", "thumb": "/content/assets/thumbs/7647276000031575310.jpg"}, {"id": "7647542718872227086", "title": "what i think about over breakfast", "views": 2247, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7647542718872227086", "thumb": "/content/assets/thumbs/7647542718872227086.jpg"}, {"id": "7649494825548401933", "title": "tldr: just do it", "views": 1821, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649494825548401933", "thumb": "/content/assets/thumbs/7649494825548401933.jpg"}, {"id": "7641350341979655438", "title": "hope you had a wonderful monday", "views": 1529, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7641350341979655438", "thumb": "/content/assets/thumbs/7641350341979655438.jpg"}, {"id": "7649853873749773581", "title": "it’s actually a good thing! congrats that u got a no 🤍", "views": 1492, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649853873749773581", "thumb": "/content/assets/thumbs/7649853873749773581.jpg"}], "views": 148500, "reach": 168718, "n_sources": 10, "blurb": "Build the inner game that keeps founders going.", "card_title": "The Founder Mindset"}, {"id": "meta-ads-course", "type": "course", "title": "Run Your First Meta Ads: A Beginner's Course", "topic": "Meta Ads", "tldr": "Okay so if you've been too scared to ever run an ad, this is for you. In six tight lessons you'll set up your very first Meta ad, learn exactly how much to spend (hint: start at $25 a day), and find a winning, profitable ad by testing one thing at a time. No agency, no big budget, no fear. Just the stuff that actually worked.", "outcome": "By the end of this course, you'll be able to set up your first Meta ad from scratch, know exactly what to spend to start, read your numbers to tell if an ad is profitable, find your winning ad through simple testing, and scale it up with confidence.", "meta": {"lessons": 6, "read_time": "~10 min"}, "lessons": [{"n": 1, "title": "Why ads (and why they're way less scary than you think)", "est": "2 min", "body_md": "Okay so here's the thing. Everyone makes ads sound terrifying, like you need a huge budget and an agency and a marketing degree. Honestly? Not true. You can set up your first ad in a couple of minutes and start with basically no money. {{cite:7652504808158399758}}\n\nLet me just free you right now: you do not need to be an expert. Ads are simply how you put your product in front of people who would love it but have never heard of you. That's it. Orders start coming in and you're literally like, where has this been all my life, why didn't I start earlier. {{cite:7640210822756650253}}\n\nWhat changed everything for one nightgown brand: going from selling one piece every couple of weeks to 50 in 30 days, and a huge chunk of that was just turning ads on. The ads were everything. So if fear is the only thing stopping you, this course is going to walk you through it step by step. You got this."}, {"n": 2, "title": "The setup basics (your account, your pixel, your first ad)", "est": "2 min", "body_md": "Okay so you'll run ads inside Meta Ads Manager (the free dashboard that powers Facebook and Instagram ads). Connect it to your store so your pixel can work. Your pixel is just a little piece of tracking code on your website that watches what visitors do, so Meta can learn who your real buyers are and find more of them. Starting small literally gives your pixel time to learn about you and find your customer. {{cite:7649859271588400398}}\n\nNow the structure. You build one campaign (the top-level container that holds your ads), then put all your ads inside that one campaign. Don't overthink it. {{cite:7653168533068729613}}\n\nA few setup choices that matter: pick \"sales\" as your objective, not \"leads,\" because you want purchases, not just sign-ups. And for audience? Honestly, just let Meta pick. You don't need to fuss over location or demographics. Let the algorithm do what it does best and find the right people. {{cite:7653166250486467854}}\n\nThat's the whole setup. Easy."}, {"n": 3, "title": "How much to spend (start tiny, on purpose)", "est": "1 min", "body_md": "Okay the big scary question: how much do I spend. Start very small. Like $25 a day small. That's the lowest base, it's not scary, and you can turn it off at any time. One brand started at literally $25 a day and got sales and was profitable day one. {{cite:7652504808158399758}}\n\nHere's how it grows in real life. You can start with $25 a day on prospecting (showing ads to brand-new people who've never heard of you) and just $5 a day on retargeting (showing ads to people who already visited your site). That's only $30 a day, basically nothing. After a week and a half of a great return, you bump it: maybe $50 prospecting and $10 retargeting, so $60 total. {{cite:7649859271588400398}}\n\nThe idea is, in theory, the more you spend the more sales come in, until it caps out. So you slowly raise it and find your ceiling. Don't dump money in scared. Start tiny, prove it works, then climb."}, {"n": 4, "title": "Find a winning, profitable ad", "est": "2 min", "body_md": "Okay this is the fun part and there's a crazy cheat code: the Meta Ads Library. You can literally see any brand's ads, including their top performers. So type in big brands you love, take screenshots, and look for patterns. What you'll notice is they're all basically the same: a gorgeous photo, your logo, and the product name. So simple. That's your first ad. {{cite:7649849173595983117}}\n\nThen you find your winner by testing ONE thing at a time. Take the same exact image and run it with a bunch of different one-liners: \"not your grandma's nightgown,\" \"the perfect nightgown for summer,\" \"beat the summer heat.\" Same photo, different copy (the words on the ad). Whichever gets the most sales is your winning copy. Cut the rest. {{cite:7653168533068729613}}\n\nNow take that winning copy and run it across five different photos to find your winning photo. Cut everything else. You just repeat that cycle, finding the best of the best of the best, over and over. Put $25 a day at the campaign level and let Meta send the money to whatever's performing. You don't pick winners, the spend reveals them."}, {"n": 5, "title": "Read your metrics and scale", "est": "2 min", "body_md": "Okay so this is not a set-it-and-forget-it thing. You check your Ads Manager every single day. Not five ads thrown up and glanced at occasionally, literally every day. {{cite:7653168533068729613}}\n\nThe two numbers to watch. Your CPA (cost per acquisition, aka what you pay to get one sale). One brand sat around $35 per purchase on roughly $1,400 spent, which worked out to about a 35% contribution margin (the slice of each sale left after costs). And know your break-even point: the most you can spend per sale and still not lose money. {{cite:7653166250486467854}}\n\nNow the rule that makes it simple: only spend money on things that are working. If an ad spent $20 and got zero purchases, turn it off, it didn't work. If a video's CPA climbs too high, turn it off. And if something is clearly working and bringing sales, double down. Raise the spend on the winner. Be honest with yourself about what's actually moving the needle, cut fast, and pour fuel on the winners."}, {"n": 6, "title": "Creative that actually converts", "est": "1 min", "body_md": "Okay so \"creative\" just means the actual stuff in your ad, the photo or video and the words. And honestly your first one should be embarrassingly simple: a great photo, your logo, the product name. It does not need to be a fancy editorial shoot. A clean iPhone photo of your hero image works great, and faceless ads (no person in them) can be your top performers. {{cite:7652504808158399758}}\n\nFor prospecting (new people), keep it beautiful and simple. For retargeting (people who already visited), go educational. One brand's best retargeting ad was an old product walkthrough video explaining how soft the fabric is, how it's made in LA, basically justifying the price and answering objections like sizing or \"is it worth it.\" That ad does amazing. {{cite:7649849173595983117}}\n\nLast tip: pay attention to ads on your own feed that make YOU click. Go back, study what hooked you, and recreate that piece. Make 5 to 10 ads a week, more is better. Most get cut, and that's totally fine. Hope that helps. Okay, go run your first ad. Bye."}], "glossary": [{"term": "Meta Ads Manager", "def": "The free dashboard where you build, run, and check the ads that show on Facebook and Instagram."}, {"term": "Pixel", "def": "A small tracking code on your website that watches visitor actions so Meta can learn who your buyers are and find more like them."}, {"term": "Campaign", "def": "The top-level container that holds your ads. Beginners can run one campaign with all ads inside it and let Meta distribute the spend."}, {"term": "Prospecting", "def": "Showing ads to brand-new people who have never heard of you, to discover new customers."}, {"term": "Retargeting", "def": "Showing ads to people who already visited your site or abandoned their cart, to win them back."}, {"term": "Abandoned cart", "def": "When someone adds a product to their cart but leaves without buying. A prime retargeting audience."}, {"term": "Creative", "def": "The actual content of your ad: the photo or video plus the words."}, {"term": "Copy", "def": "The written words on your ad, like a one-liner or tagline."}, {"term": "Objective", "def": "What you tell Meta to optimize for. Choose 'sales' (purchases), not 'leads' (sign-ups)."}, {"term": "CPA", "def": "Cost per acquisition: what you pay in ad spend to get one sale."}, {"term": "ROAS", "def": "Return on ad spend: the revenue you earn for every dollar you spend on ads."}, {"term": "Contribution margin", "def": "The slice of each sale left over after your costs, used to tell if an ad is actually profitable."}, {"term": "Break-even point", "def": "The most you can spend to get one sale without losing money. Above it, turn the ad off."}, {"term": "Meta Ads Library", "def": "A free public tool where you can view any brand's running ads, including top performers, for inspiration."}, {"term": "Faceless ad", "def": "An ad with no person in it, just the product. Often a strong performer."}, {"term": "UGC", "def": "User-generated content: casual, real-feeling video that looks like a customer made it, great for educational retargeting ads."}], "sources": ["7649849173595983117", "7652504808158399758", "7649859271588400398", "7640210822756650253", "7641713496127786253", "7653168533068729613", "7653166250486467854"], "source_videos": [{"id": "7649849173595983117", "title": "Replying to @Dee a beginners guide to meta ads 🩵", "views": 34500, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649849173595983117", "thumb": "/content/assets/thumbs/7649849173595983117.jpg"}, {"id": "7652504808158399758", "title": "3 min ted talk on how to set up your first meta ad and how much to sp...", "views": 16300, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7652504808158399758", "thumb": "/content/assets/thumbs/7652504808158399758.jpg"}, {"id": "7649859271588400398", "title": "Replying to @Tania B. very approachable, start small and grow 🤍", "views": 4697, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7649859271588400398", "thumb": "/content/assets/thumbs/7649859271588400398.jpg"}, {"id": "7640210822756650253", "title": "such a happy friday", "views": 2444, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7640210822756650253", "thumb": "/content/assets/thumbs/7640210822756650253.jpg"}, {"id": "7641713496127786253", "title": "didn’t get much on the to do list done today but still a good one", "views": 2119, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7641713496127786253", "thumb": "/content/assets/thumbs/7641713496127786253.jpg"}, {"id": "7653168533068729613", "title": "all my free game on setting up your meta ads for your brand profitabl...", "views": 1833, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7653168533068729613", "thumb": "/content/assets/thumbs/7653168533068729613.jpg"}, {"id": "7653166250486467854", "title": "4 min call on how to find a profitable ad, pick ad spend, and picking...", "views": 1504, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7653166250486467854", "thumb": "/content/assets/thumbs/7653166250486467854.jpg"}], "views": 34500, "reach": 63397, "n_sources": 7, "blurb": "Set up your first profitable Meta ad with confidence.", "card_title": "Run Your First Meta Ads"}, {"id": "operations-course", "type": "course", "title": "Run the Back Office of Your Brand: A Beginner's Course", "topic": "Operations & Systems", "tldr": "The unglamorous back office (your inbox, your customer experience, your books) is where most founders quietly fall behind. Here is a simple, repeatable system for keeping all of it clean so you can spend your time making decisions, not doing data entry.", "outcome": "By the end of this course, you'll be able to run a near-empty inbox, design a customer experience that lowers returns, use AI to categorize your expenses in minutes, and turn the whole thing into a monthly ritual you actually keep up with.", "meta": {"lessons": 4, "read_time": "~6 min"}, "lessons": [{"n": 1, "title": "Treat Your Inbox Like a Desk (Inbox Zero)", "est": "1.5 min", "body_md": "Okay so here's the reframe that changes everything: your inbox is your desk, not your filing cabinet. You only want the things you're actively working on right now in front of you. Everything else gets filed or thrown away.\n\nThree moves, that's it:\n\n1. **File the finished stuff.** Build a folder called Complete, with subfolders underneath for each business, division, or category. The second a thread is done (or you've replied and there's literally nothing left on your end) you drag and drop it out of the inbox into the right folder. Constantly. Anything you might want to refer back to later (important historical data) gets filed, not deleted.\n2. **Delete without guilt.** Notifications, promotions, cold emails, anything that isn't relevant or interesting to you: delete, delete, delete. You get bombarded with information all day, and you honestly don't owe any of it your mind share. Don't feel bad about it.\n3. **Whatever's left is your to-do list.** The only things sitting in your inbox at the end of the day should be open projects.\n\nHere's the magic of setting it up this way. It's always clear what you should be working on, so you never freeze up, lose momentum, and start doom-scrolling your own email. And because you only ever have, like, eight emails staring at you, it kind of forces you to respond fast. Just answer the email. {{cite:7653176885479787790}}\n\nHope that helps."}, {"n": 2, "title": "Customer Service and Returns: The Experience Is the Strategy", "est": "1.5 min", "body_md": "Here's the thing most new founders miss: customer service and returns aren't a cost center you tolerate, they're a lever you can actually pull. And the unlock starts way before anyone asks for a refund. It starts with how the order feels when it lands on their doorstep.\n\nThink about it from the customer's side. When something arrives hand-wrapped, like it was packed in someone's kitchen (because it was), you feel a connection. You're way less likely to coldly box it back up and ship it off. When it shows up feeling like it came off a giant faceless assembly line, returning it costs you nothing emotionally. So those little hand-touch elements (a handwritten card, careful wrapping, a real human signature) can genuinely lower your return rate. {{cite:7648717286320262413}}\n\nNow run the math, because this is the part to actually test for your own brand: is it cheaper to pay your **3PL** (third-party logistics company, the warehouse that stores and ships your orders) to add those personal touches up front, or to eat the full cost of processing a return or exchange later (return shipping, restocking, the lost sale)? Often the little touch wins.\n\nThe takeaway for your back office: don't treat returns as just damage control on the back end. Design the front-end experience so fewer returns ever happen, then measure whether the upgrade pays for itself. Test it, don't guess."}, {"n": 3, "title": "Make Claude Your Bookkeeping Buddy", "est": "1.5 min", "body_md": "Okay, if you hate finance and avoid your bookkeeping until you're (whisper it) six months behind, this one's for you. You can use Claude (an AI assistant) to categorize your expenses and get caught up in minutes instead of dreading it for weeks.\n\nYou need three documents, all exported from your accounting software as CSV files (a plain spreadsheet format):\n\n1. **Your expenses that need categorizing** for the month.\n2. **Your chart of accounts** (the master list of categories your business sorts money into, like \"software,\" \"shipping,\" \"marketing\").\n3. **Some historical context** (optional but helps a lot): a guide an accountant made for how you organize expenses, or just your past already-categorized expenses so Claude can learn your pattern.\n\nUpload all three and tell Claude: it's your job to organize this, walk me through it line by line, and if you're not sure about something, flag it. Don't guess, don't make things up. That last instruction matters, because you don't want it to **hallucinate** (confidently invent a wrong answer). {{cite:7647245625704172814}}\n\nThen go down the list. Anything that looks off, just talk to it: \"hey, this one was actually a photo shoot expense, recategorize it.\" It updates instantly. There's no direct connection between Claude and your accounting software yet, so you'll paste the final categories back in yourself, but honestly that extra step is nice because you get to double-check the work before anything's official."}, {"n": 4, "title": "Turn It Into a System You'll Actually Keep", "est": "1.5 min", "body_md": "A back office only works if you keep showing up for it, and the trick to keeping up is making the work boring-easy and a little bit fun. So let's turn Lesson 3 into a repeatable ritual.\n\nOnce you've run the bookkeeping flow a couple times and you trust the process, build it into a **skill** (a saved, reusable instruction set you can trigger by name, so you never re-explain the steps). Name it whatever you want. The name to steal here is \"money dinner.\" Instead of dreading finance, you're treating yourself to a little date night with your numbers. Ooh, money dinner. So fun. {{cite:7646972838905138445}}\n\nNow the monthly loop is dead simple: say \"run money dinner,\" upload that month's expenses, and it's all categorized in seconds. You never fall behind again.\n\nAnd here's why this is the real point of the whole course. When the inbox files itself, the packaging quietly lowers returns, and the books take minutes, you stop spending your life clicking buttons and doing manual data entry. You get to actually look at your P&L (your profit and loss statement, the report showing what you earned versus what you spent), read your reports, and make confident decisions with numbers that are always up to date.\n\nThat's the back office handled. Hope that helps. Okay, bye."}], "glossary": [{"term": "Inbox zero", "def": "An email approach where you keep your inbox nearly empty, leaving only active projects in view and filing or deleting everything else."}, {"term": "3PL (third-party logistics)", "def": "An outside warehouse company that stores your inventory and packs and ships your orders for you."}, {"term": "Return rate", "def": "The share of orders that customers send back. Lowering it protects your margins because returns cost you shipping and lost sales."}, {"term": "CSV", "def": "A plain spreadsheet file format (comma-separated values) that most accounting software can export and most tools can read."}, {"term": "Chart of accounts", "def": "The master list of categories your business uses to sort every dollar in and out, like software, shipping, or marketing."}, {"term": "Hallucinate", "def": "When an AI confidently makes up an answer that sounds right but isn't. You prevent it by telling the AI to flag uncertainty instead of guessing."}, {"term": "Skill", "def": "A saved, reusable set of instructions you can trigger by name (like 'money dinner') so you never have to re-explain a repeated task."}, {"term": "P&L (profit and loss statement)", "def": "A financial report showing what your business earned versus what it spent over a period, so you can see if you're making money."}], "sources": ["7648717286320262413", "7647245625704172814", "7646972838905138445", "7653176885479787790"], "source_videos": [{"id": "7648717286320262413", "title": "curious if processing a return is more cost effective or adding hand ...", "views": 6204, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7648717286320262413", "thumb": "/content/assets/thumbs/7648717286320262413.jpg"}, {"id": "7647245625704172814", "title": "cool ways to use claude to make ur life so much easier as a business ...", "views": 3365, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7647245625704172814", "thumb": "/content/assets/thumbs/7647245625704172814.jpg"}, {"id": "7646972838905138445", "title": "there are a hundred things on your to do list as a business owner, i ...", "views": 2760, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7646972838905138445", "thumb": "/content/assets/thumbs/7646972838905138445.jpg"}, {"id": "7653176885479787790", "title": "this is the email hygiene no one taught you", "views": 1018, "date": "", "url": "https://www.tiktok.com/@nat.lucyy/video/7653176885479787790", "thumb": "/content/assets/thumbs/7653176885479787790.jpg"}], "views": 6204, "reach": 13347, "n_sources": 4, "blurb": "Keep your inbox, customers, and books under control.", "card_title": "Run the Back Office of Your Brand"}]}</script>
<script>

 `Take a course consolidated from her most popular topics or search to find the video where she said something.`;

 ['pricing','MOQ','ad spend','manufacturer','Faire','how to post','tariffs','packaging']
